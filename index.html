<html lang="en">

<title>ISCC 2026 — Command Center</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0f1e;color:#e8eaf0;min-height:100vh}
:root{
  --green:#22c55e;--green-dim:#16a34a;--red:#ef4444;--red-dim:#b91c1c;
  --amber:#f59e0b;--blue:#3b82f6;--blue-dim:#1d4ed8;--purple:#8b5cf6;
  --cyan:#06b6d4;--surface:#111827;--surface2:#1f2937;--surface3:#374151;
  --border:#2d3748;--text-dim:#9ca3af;--text-bright:#f9fafb;
}
/* ===== AUTH ===== */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a0f1e 0%,#0f1f3d 100%)}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:360px;text-align:center}
.auth-logo{font-size:48px;margin-bottom:16px}
.auth-title{font-size:24px;font-weight:700;color:var(--green);margin-bottom:8px}
.auth-sub{font-size:13px;color:var(--text-dim);margin-bottom:32px}
.auth-input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:14px;letter-spacing:2px;margin-bottom:16px}
.auth-input:focus{outline:none;border-color:var(--green)}
.auth-btn{width:100%;padding:12px;background:var(--green);color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.auth-btn:hover{background:#16a34a}
.auth-err{color:var(--red);font-size:13px;margin-top:8px}
/* ===== LAYOUT ===== */
.app{display:flex;height:100vh;overflow:hidden}
/* ===== SIDEBAR ===== */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-logo-title{font-size:16px;font-weight:800;color:var(--green);letter-spacing:1px}
.sidebar-logo-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--green);background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:4px;padding:2px 7px;margin-top:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-section{padding:8px 12px 4px;font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:6px;margin:1px 8px;font-size:13px;color:var(--text-dim);transition:all .15s}
.nav-item:hover{background:var(--surface2);color:var(--text-bright)}
.nav-item.active{background:rgba(34,197,94,.15);color:var(--green);font-weight:600}
.nav-icon{width:18px;text-align:center;font-size:16px}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sidebar-clock{padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim)}
.clock-time{font-size:20px;font-weight:700;color:var(--text-bright);font-variant-numeric:tabular-nums}
/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:700;color:var(--text-bright)}
.topbar-actions{display:flex;gap:8px}
.content{flex:1;overflow-y:auto;padding:24px}
/* ===== CARDS ===== */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;opacity:.08;transform:translate(10px,-10px)}
.stat-card.green::before{background:var(--green)}
.stat-card.amber::before{background:var(--amber)}
.stat-card.blue::before{background:var(--blue)}
.stat-card.red::before{background:var(--red)}
.stat-card.purple::before{background:var(--purple)}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:800;color:var(--text-bright)}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:4px}
.stat-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
/* ===== TABLES ===== */
.table-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.table-title{font-size:15px;font-weight:700;color:var(--text-bright)}
.table-sub{font-size:12px;color:var(--text-dim);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;background:var(--surface3);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #1e2535;vertical-align:top}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.badge.green{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.badge.amber{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.badge.red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge.blue{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.badge.purple{background:rgba(139,92,246,.15);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.badge.gray{background:rgba(156,163,175,.1);color:var(--text-dim);border:1px solid rgba(156,163,175,.2)}
.badge.cyan{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--green);color:#000}
.btn-primary:hover{background:var(--green-dim)}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface3);color:var(--text-bright)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-dim)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:var(--red-dim)}
.btn-sm{padding:4px 10px;font-size:12px}
/* ===== SEARCH ===== */
.search-bar{position:relative}
.search-bar input{padding:8px 12px 8px 36px;background:var(--surface3);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:13px;width:240px}
.search-bar input:focus{outline:none;border-color:var(--blue)}
.search-bar .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px}
/* ===== TABS ===== */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-dim);transition:all .15s}
.tab.active{background:var(--surface3);color:var(--text-bright)}
.tab:hover:not(.active){color:var(--text-bright)}
/* ===== PROFILE MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:700;color:var(--text-bright)}
.modal-body{padding:24px}
.profile-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.info-item label{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.info-item span{font-size:14px;color:var(--text-bright)}
.alert-box{padding:12px 14px;border-radius:8px;margin-bottom:12px;font-size:13px}
.alert-box.allergy{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.alert-box.dietary{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fcd34d}
.alert-box.minor{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);color:#c4b5fd}
.section-title{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;border-top:1px solid var(--border);padding-top:12px}
/* ===== INCIDENT FORM ===== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:16px}
.form-group.full{grid-column:span 2}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;background:var(--surface3);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:13px}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--blue)}
.form-textarea{resize:vertical;min-height:80px}
.form-select option{background:var(--surface2)}
/* ===== FLIGHT TRACKER LINK ===== */
.flight-link{color:var(--cyan);text-decoration:none;font-weight:600}
.flight-link:hover{text-decoration:underline}
/* ===== MOBILE RESPONSIVE ===== */
@media (max-width:768px){
  /* Layout */
  .app{flex-direction:column}
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:300;width:260px;transform:translateX(-100%);transition:transform .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:299}
  .sidebar-overlay.open{display:block}
  .main{width:100%;padding-bottom:64px}
  /* Topbar */
  .topbar{padding:10px 14px;gap:8px}
  .topbar-title{font-size:15px}
  .hamburger{display:flex!important}
  /* Content */
  .content{padding:12px}
  /* Cards */
  .cards-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-card{padding:12px}
  .stat-val{font-size:22px}
  /* Tables — horizontal scroll */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:520px}
  th,td{padding:8px 10px;font-size:12px}
  /* Search */
  .search-bar{width:100%}
  .search-bar input{width:100%!important;box-sizing:border-box}
  /* Tabs — horizontal scroll */
  .tabs{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  /* Modals — full screen */
  .modal-overlay{padding:0;align-items:flex-end}
  .modal{border-radius:16px 16px 0 0;max-height:92vh;max-width:100%}
  /* Info grids — single column */
  .info-grid{grid-template-columns:1fr!important}
  /* Dashboard side-by-side panels */
  .dashboard-panels{grid-template-columns:1fr!important}
  /* Filter buttons wrap */
  .filter-row{flex-wrap:wrap}
  /* Section header */
  .section-header{flex-direction:column;align-items:flex-start;gap:8px}
  /* Bottom nav */
  .bottom-nav{display:flex!important}
  /* Clock hidden on mobile */
  .sidebar-clock{display:none}
  /* Hide topbar live indicator label on very small screens */
  .live-label{display:none}
}
@media (min-width:769px){
  .hamburger{display:none!important}
  .bottom-nav{display:none!important}
  .sidebar-overlay{display:none!important}
}
/* Bottom nav bar */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surface);border-top:1px solid var(--border);z-index:200;align-items:stretch}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;font-weight:600;color:var(--text-dim);cursor:pointer;padding:6px 4px;border:none;background:transparent;position:relative}
.bottom-nav-item.active{color:var(--green)}
.bottom-nav-item .bnav-icon{font-size:20px;line-height:1}
.bottom-nav-badge{position:absolute;top:6px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:14px;text-align:center}
/* Hamburger button */
.hamburger{display:none;background:transparent;border:1px solid var(--border);color:var(--text-dim);border-radius:6px;padding:6px 8px;font-size:18px;cursor:pointer;line-height:1}
/* ===== PICKUP STATUS ===== */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.status-dot.pending{background:var(--amber);animation:pulse 2s ease-in-out infinite}
.status-dot.done{background:var(--green)}
.status-dot.none{background:var(--text-dim)}
/* ===== SECTION HEADER ===== */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.section-heading{font-size:20px;font-weight:800;color:var(--text-bright)}
.section-sub{font-size:13px;color:var(--text-dim);margin-top:4px}
/* ===== ALERT STRIP ===== */
.alert-strip{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#fca5a5;display:flex;align-items:center;gap:8px}
/* ===== MINI TAGS ===== */
.tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
/* ===== INCIDENT TABLE ===== */
.inc-row-open td{background:rgba(239,68,68,.04)}
.inc-row-resolved td{background:rgba(34,197,94,.03)}
/* ===== FLIGHT SUMMARY ===== */
.flight-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer}
.flight-card:hover{border-color:var(--blue-dim)}
.flight-meta{flex:1;min-width:0}
.flight-num{font-size:15px;font-weight:700;color:var(--text-bright);font-variant-numeric:tabular-nums}
.flight-airline{font-size:12px;color:var(--text-dim)}
.flight-time{font-size:13px;color:var(--text-bright);font-variant-numeric:tabular-nums}
.passenger-list{font-size:12px;color:var(--text-dim)}
/* ===== MINOR BADGE ===== */
.minor-flag{background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.3);font-size:10px;padding:1px 6px;border-radius:4px;font-weight:700}
/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-icon{font-size:48px;margin-bottom:16px}
/* ===== TOGGLE ===== */
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-switch{width:36px;height:20px;border-radius:10px;background:var(--surface3);position:relative;transition:background .2s}
.toggle-switch.on{background:var(--green)}
.toggle-switch::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s}
.toggle-switch.on::after{left:18px}
</style>
</head>

function gsUrl(id, sheet) {
  // Two URL formats: gviz/tq (more data) and export (more CORS-friendly)
  const ts = Date.now();
  return {
    gviz:   `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}&_=${ts}`,
    export: `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&sheet=${encodeURIComponent(sheet)}&_=${ts}`,
  };
}
function gsProxies(id, sheet) {
  const gviz   = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`;
  const exp    = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&sheet=${encodeURIComponent(sheet)}`;
  return [
    // corsproxy.io — most reliable free proxy
    { url: `https://corsproxy.io/?${encodeURIComponent(gviz)}`, json: false },
    { url: `https://corsproxy.io/?${encodeURIComponent(exp)}`,  json: false },
    // allorigins — JSON wrapper (most stable endpoint)
    { url: `https://api.allorigins.win/get?url=${encodeURIComponent(gviz)}`, json: true },
    { url: `https://api.allorigins.win/get?url=${encodeURIComponent(exp)}`,  json: true },
    // allorigins raw
    { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(gviz)}`, json: false },
    // thingproxy fallback
    { url: `https://thingproxy.freeboard.io/fetch/${gviz}`, json: false },
  ];
}

async function fetchCSV(id, sheetName) {
  const isHtml   = t => t.trimStart().startsWith('<!') || t.trimStart().startsWith('<html');
  const isNotCSV = t => !t || isHtml(t) || t.trim().length < 5;

  const parseText = (text, label) => {
    if (isNotCSV(text)) throw new Error('NOT_CSV:' + label);
    const rows = Papa.parse(text, { skipEmptyLines: true }).data;
    if (rows.length === 0) throw new Error('EMPTY:' + label);
    return rows;
  };

  // 1) Direct fetch — works reliably from GitHub Pages (HTTPS) and modern browsers
  const urls = gsUrl(id, sheetName);
  for (const [label, url] of [['gviz-direct', urls.gviz], ['export-direct', urls.export]]) {
    try {
      const res = await fetch(url, { mode: 'cors', cache: 'no-store' });
      if (res.ok) {
        const text = await res.text();
        if (!isNotCSV(text)) return parseText(text, label);
      }
    } catch(_) { /* CORS blocked locally — fall through to proxies */ }
  }

  // 2) Try CORS proxies in sequence
  const proxies = gsProxies(id, sheetName);
  const errors = [];
  for (const { url, json } of proxies) {
    try {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) { errors.push(`HTTP ${res.status}`); continue; }
      const raw  = json ? ((await res.json()).contents || '') : await res.text();
      // Detect Google sign-in page (sheet not public)
      if (raw.includes('accounts.google.com') || raw.includes('ServiceLogin')) {
        throw new Error(`SHARING: Sheet "${sheetName}" is not public — set Share → "Anyone with the link" → Viewer`);
      }
      if (!isNotCSV(raw)) return parseText(raw, url);
      errors.push('proxy returned non-CSV');
    } catch(e) {
      if (e.message.startsWith('SHARING:')) throw new Error(e.message.replace('SHARING:',''));
      errors.push(e.message.replace(/NOT_CSV:|EMPTY:/,''));
    }
  }
  throw new Error(`Sheet "${sheetName}" unreachable — all proxies failed. ${errors.slice(-2).join('; ')}`);
}

// ---- CSV parsing helpers ----
function cv(val) {
  if (val === null || val === undefined) return '';
  const s = String(val).trim();
  return (s === '' || s.toLowerCase() === 'null') ? '' : s;
}

function parseTime(s) {
  s = cv(s);
  if (!s) return '';
  // "08:00:00" or "08:00" → "08:00"
  if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(s)) return s.slice(0, 5);
  // "10:42 AM" style
  const m = s.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if (m) {
    let h = parseInt(m[1]), min = m[2];
    if (m[3] && m[3].toUpperCase() === 'PM' && h < 12) h += 12;
    if (m[3] && m[3].toUpperCase() === 'AM' && h === 12) h = 0;
    return `${String(h).padStart(2,'0')}:${min}`;
  }
  return '';
}

function parseDate(s) {
  s = cv(s);
  if (!s) return '';
  // Fix known March typo → April
  if (s.includes('2026-03-03') || s.includes('3/3/2026')) return '2026-04-03';
  // ISO date
  const iso = s.match(/(\d{4}-\d{2}-\d{2})/);
  if (iso) return iso[1];
  // "April 3rd" style
  if (/april/i.test(s)) return '2026-04-03';
  // M/D/YYYY
  const mdy = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (mdy) return `${mdy[3]}-${String(mdy[1]).padStart(2,'0')}-${String(mdy[2]).padStart(2,'0')}`;
  return '';
}

function normFlight(num) {
  const n = cv(num).toUpperCase().replace(/\s+/g,'');
  if (['', '-', 'N/A', 'NA', 'NONE', 'UNKNOWNATPRESENT', 'NOTBOOKEDYET'].includes(n)) return '';
  const cleaned = n
    .replace(/^DELTADELTA/,'DL').replace(/^DELTA(?=[A-Z0-9])/,'DL')
    .replace(/^FRONTIER(?=[0-9])/,'F9').replace(/^AMERICAN(?=[0-9])/,'AA')
    .replace(/^SOUTHWEST(?=[0-9])/,'WN').replace(/^UNITED(?=[0-9])/,'UA');
  // Must contain at least one digit to be a real flight number; booking codes (6+ chars, no digits after prefix) are invalid
  if (!/\d/.test(cleaned)) return '';
  return cleaned;
}

function parseVolunteers(nameCell, phoneCell) {
  const names = cv(nameCell).split(/\n|;|&/).map(s=>s.trim()).filter(Boolean);
  const phones = cv(phoneCell).split(/\n|;/).map(s=>s.trim()).filter(Boolean);
  return names.map((n,i) => ({ name: n, phone: phones[i] || '' }));
}

// ---- Parse each sheet from raw CSV rows ----
function parseArrivalIAH(rows) {
  // Row 0 is header, rows 1-72 are working list, 72+ are old backup
  const arrivals = [];
  const seen = new Set();
  for (let i = 1; i <= Math.min(150, rows.length - 1); i++) {
    const r = rows[i];
    if (!r || r.length < 5) continue;
    const fn = cv(r[0]); const ln = cv(r[1]);
    if (!fn || fn === 'First Name') continue;
    const phone = cv(r[2]);
    const category = cv(r[3]);
    const date = parseDate(r[4]);
    const time = parseTime(r[5]);
    const airport = cv(r[6]) || 'IAH';
    const airline = cv(r[7]);
    const flightNum = normFlight(r[8]);
    const pickupTime = parseTime(r[9]);
    const vols = parseVolunteers(r[10], r[11]);
    const transportTo = cv(r[12]);
    const commDone = cv(r[13]);
    const pickupDone = cv(r[14]);
    const notes = cv(r[15]) || cv(r[16]);
    const key = `${fn.toLowerCase()}_${ln.toLowerCase()}_${airport}_${flightNum}`;
    if (seen.has(key)) continue;
    seen.add(key);
    arrivals.push({
      firstName: fn, lastName: ln, fullName: `${fn} ${ln}`.trim(),
      phone, category, date, time, airport, airline, flightNum,
      pickupTime, volunteerName: vols[0]?.name || '', volunteerPhone: vols[0]?.phone || '',
      volunteers: vols, transportTo, commDone, pickupDone, notes, _seen: key
    });
  }
  return { arrivals, seen };
}

function parseArrivalHobby(rows, seenFromIAH) {
  const extra = [];
  const seen = new Set(seenFromIAH);
  // Header is row 0
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 5) continue;
    const fn = cv(r[0]); const ln = cv(r[1]);
    if (!fn || fn === 'First Name') continue;
    const airport = cv(r[5]) || 'HOBBY';
    if (airport !== 'HOBBY') continue; // IAH ones already captured
    const phone = cv(r[2]);
    const date = parseDate(r[3]);
    const time = parseTime(r[4]);
    const airline = cv(r[6]);
    const flightNum = normFlight(r[7]);
    const pickupTime = parseTime(r[8]);
    const vols = parseVolunteers(r[9], r[10]);
    const transportTo = cv(r[11]);
    const key = `${fn.toLowerCase()}_${ln.toLowerCase()}_HOBBY_${flightNum}`;
    if (seen.has(key)) continue;
    seen.add(key);
    extra.push({
      firstName: fn, lastName: ln, fullName: `${fn} ${ln}`.trim(),
      phone, category: '', date, time, airport: 'HOBBY', airline, flightNum,
      pickupTime, volunteerName: vols[0]?.name || '', volunteerPhone: vols[0]?.phone || '',
      volunteers: vols, transportTo, commDone: '', pickupDone: '', notes: ''
    });
  }
  return extra;
}

function parseDeparture(rows, sheetLabel) {
  const deps = [];
  // Row 0 is header
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 5) continue;
    const fn = cv(r[0]); const ln = cv(r[1]);
    if (!fn || fn === 'First Name') continue;
    const airline = cv(r[6]);
    const flightNum = normFlight(r[7]);
    const vols = parseVolunteers(r[9], r[10]);
    deps.push({
      sheet: sheetLabel,
      firstName: fn, lastName: ln, fullName: `${fn} ${ln}`.trim(),
      phone: cv(r[2]),
      date: parseDate(r[3]), time: parseTime(r[4]),
      airport: cv(r[5]), airline, flightNum,
      pickupTime: parseTime(r[8]),
      volunteerName: vols[0]?.name || '', volunteerPhone: vols[0]?.phone || '',
      volunteers: vols, commDone: '', dropoffDone: '', notes: ''
    });
  }
  return deps;
}

function parseStaff(rows) {
  const staff = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const name = cv(r[2]);
    if (!name) continue;
    staff.push({ id: cv(r[0]), position: cv(r[1]), name, phone: cv(r[3]), email: cv(r[4]), region: cv(r[5]) });
  }
  return staff;
}

function parseAthletes(rows) {
  // Find header row (where col 1 === "First Name")
  let headerIdx = rows.findIndex(r => cv(r[1]) === 'First Name');
  if (headerIdx < 0) headerIdx = 1;
  const athletes = {};
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const fn = cv(r[1]); const ln = cv(r[2]);
    if (!fn) continue;
    const k = `${fn} ${ln}`.toLowerCase().trim();
    athletes[k] = {
      num: cv(r[0]), firstName: fn, lastName: ln, fullName: `${fn} ${ln}`,
      email: cv(r[3]), phone: cv(r[4]),
      emergencyContact: cv(r[5]), emergencyPhone: cv(r[6])
    };
  }
  return athletes;
}

function parseAllergies(rows) {
  const allergies = {}; const dietary = {};
  let mode = null;
  for (const r of rows) {
    const v0 = cv(r[0]);
    if (v0 === 'ALLERGIES') { mode = 'allergy'; continue; }
    if (v0 === 'DIETARY RESTRICTIONS') { mode = 'dietary'; continue; }
    if (!v0 || v0 === 'Name') continue;
    const entry = { name: v0, detail: cv(r[1]), ec1Name: cv(r[2]), ec1Phone: cv(r[5]) };
    if (mode === 'allergy') allergies[v0.toLowerCase()] = entry;
    else if (mode === 'dietary') dietary[v0.toLowerCase()] = entry;
  }
  return { allergies, dietary };
}

function findAllergy(fn, ln, allergies) {
  const nl = `${fn} ${ln}`.toLowerCase();
  for (const [k, v] of Object.entries(allergies))
    if (nl.includes(k) || k.includes(fn.toLowerCase())) return v.detail;
  return '';
}
function findDietary(fn, ln, dietary) {
  const nl = `${fn} ${ln}`.toLowerCase();
  for (const [k, v] of Object.entries(dietary))
    if (nl.includes(k) || k.includes(fn.toLowerCase())) return v.detail;
  return '';
}

function buildProfiles(arrivals, departures, athletesHotel, allergies, dietary) {
  const profiles = {};
  // Seed from hotel list
  for (const [k, a] of Object.entries(athletesHotel)) {
    profiles[k] = { ...a,
      allergies: findAllergy(a.firstName, a.lastName, allergies),
      dietary: findDietary(a.firstName, a.lastName, dietary),
      isMinor: false, arrivals: [], departures: []
    };
  }
  for (const arr of arrivals) {
    const k = arr.fullName.toLowerCase().trim();
    if (!profiles[k]) profiles[k] = {
      firstName: arr.firstName, lastName: arr.lastName, fullName: arr.fullName,
      email: '', phone: arr.phone, emergencyContact: '', emergencyPhone: '',
      allergies: findAllergy(arr.firstName, arr.lastName, allergies),
      dietary: findDietary(arr.firstName, arr.lastName, dietary),
      isMinor: arr.category?.toLowerCase() === 'kid', arrivals: [], departures: []
    };
    else if (arr.category?.toLowerCase() === 'kid') profiles[k].isMinor = true;
    profiles[k].arrivals.push(arr);
  }
  for (const dep of departures) {
    const k = dep.fullName.toLowerCase().trim();
    if (!profiles[k]) profiles[k] = {
      firstName: dep.firstName, lastName: dep.lastName, fullName: dep.fullName,
      email: '', phone: dep.phone, emergencyContact: '', emergencyPhone: '',
      allergies: '', dietary: '', isMinor: false, arrivals: [], departures: []
    };
    profiles[k].departures.push(dep);
  }
  return Object.entries(profiles).map(([,v], i) => ({ ...v, id: `P${String(i+1).padStart(3,'0')}` }));
}

// ---- Parse logistics hotel athletes (for inHotel flag + emergency contacts) ----
function parseLogisticsHotel(rows) {
  // Find header row (has "First Name")
  let headerIdx = rows.findIndex(r => r.some(c => cv(c).toLowerCase().includes('first name')));
  if (headerIdx < 0) headerIdx = 1;
  const phoneSet = new Set();
  const emergMap = {}; // phone → {name, phone}
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const phone = cv(r[4]);
    const emergName = cv(r[5]);
    const emergPhone = cv(r[6]);
    if (!phone) continue;
    const pc = phone.replace(/[\(\)\s\-\.]/g,'');
    phoneSet.add(pc);
    if (emergName) emergMap[pc] = { emergencyContact: emergName, emergencyPhone: emergPhone };
  }
  return { phoneSet, emergMap };
}


// ---- Parse the "Travel Form" sheet for departure data ----
function parseTravelForm(rows) {
  // Cols: 3=FirstName, 4=LastName, 6=Phone, 10=DepDate, 19=DepTime, 20=DepAirport, 21=DepAirline, 22=DepFlight#
  const departures = [];
  const seen = new Set();
  const parseDepDate = s => {
    s = cv(s);
    if (!s) return '';
    const m = s.match(/April\s+(\d+)/i);
    if (m) return `2026-04-${String(m[1]).padStart(2,'0')}`;
    const iso = s.match(/(\d{4}-\d{2}-\d{2})/);
    if (iso) return iso[1];
    const mdy = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (mdy) return `${mdy[3]}-${String(mdy[1]).padStart(2,'0')}-${String(mdy[2]).padStart(2,'0')}`;
    return '';
  };
  const fixApt = s => {
    s = cv(s);
    if (/hobby|HOU/i.test(s)) return 'HOU';
    if (/bush|IAH|intercontinental/i.test(s)) return 'IAH';
    return s.replace(/\s*-\s*.*/,'').trim().toUpperCase().slice(0,3);
  };
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const fn = cv(r[3]); const ln = cv(r[4]);
    if (!fn) continue;
    const name = `${fn} ${ln}`.trim();
    const phone = cv(r[6]);
    const depDate = parseDepDate(r[10]);
    const depAirline = cv(r[21]);
    if (!depAirline || !depDate) continue;
    const dayM = depDate.match(/-0([567])$/);
    if (!dayM) continue;
    const dayNum = parseInt(dayM[1]);
    const sheetName = dayNum === 5 ? 'DEP 5TH' : dayNum === 6 ? 'DEP 6TH' : 'DEP 7TH';
    const key = `${name.toLowerCase()}_${depDate}_${depAirline.toLowerCase()}`;
    if (seen.has(key)) continue;
    seen.add(key);
    const depFlight = normFlight(r[22]);
    const parts = name.split(' ');
    departures.push({
      sheet: sheetName, firstName: parts[0], lastName: parts.slice(1).join(' '), fullName: name,
      phone, date: depDate, time: parseTime(r[19]),
      airport: fixApt(r[20]), airline: depAirline, flightNum: depFlight,
      pickupTime: '', volunteerName: '', volunteerPhone: '', commDone: '', dropoffDone: ''
    });
  }
  return departures;
}

// ---- Parse the master "All" sheet: athletes + departures ----
function parseAllSheet(rows, allergyRows) {
  if (!rows || rows.length < 2) return { players: [], departures: [], allergyAlerts: [] };

  // Parse allergy tab: col0=Name, col1=Special Y/N, col2=Special Desc, col3=Allergy Y/N, col4=Allergy List, col5=Diet Y/N, col6=Diet List
  const allergyMap = {};
  for (let i = 1; i < allergyRows.length; i++) {
    const r = allergyRows[i];
    const name = cv(r[0]).toLowerCase().trim();
    if (!name) continue;
    const specialYN  = cv(r[1]);
    const specialDesc = cv(r[2]);
    const allergyYN  = cv(r[3]);
    const allergyList = cv(r[4]);
    const dietYN     = cv(r[5]);
    const dietList   = cv(r[6]);
    if ((allergyYN === 'Yes' && allergyList) || (dietYN === 'Yes' && dietList) || (specialYN === 'Yes' && specialDesc)) {
      allergyMap[name] = {
        allergy:      allergyYN  === 'Yes' ? allergyList  : '',
        dietary:      dietYN     === 'Yes' ? dietList     : '',
        specialNeeds: specialYN  === 'Yes' ? specialDesc  : '',
      };
    }
  }

  // Map column indices by header name (row 0)
  const hdr = (rows[0] || []).map(h => cv(h));
  const cidx = n => hdr.indexOf(n);
  const C = {
    name:     cidx('Athlete Name'),    phone:    cidx('Athlete Phone'),   email:    cidx('Athlete Email'),
    team:     cidx('Team Name'),       gender:   cidx('Gender'),          dob:      cidx('DOB'),
    age:      cidx('Age'),             level:    cidx('Age Level'),
    jersey:   cidx('Jersey Number'),   size:     cidx('Jersey Size'),     pos:      cidx('Position'),
    cap:      cidx('Captain Name'),
    chapN:    cidx('Chaperone Name'),  chapE:    cidx('Chaperone Email'), chapP:    cidx('Chaperone Phone'),
    emerN:    cidx('Emergency Contact Name'),    emerP: cidx('Emergency Contact Phone'),
    hotel:    cidx('Hotel Yes/No'),    shuttle:  cidx('Shuttle Yes/No'),
    arrDate:  cidx('Arrival Date'),    arrTime:  cidx('Arrival Time'),
    arrApt:   cidx('Arrival Airport'), arrAl:    cidx('Arrival Airline'), arrFl:    cidx('Arrival Flight#'),
    pickup:   cidx('PICK UP TIME'),    vol:      cidx('VOLUNTEER NAME'),  volPh:    cidx('PHONE NUMBER'),
    depDate:  cidx('Departure Date'),  depTime:  cidx('Departure Time'),
    depApt:   cidx('Departure Airport'), depAl:  cidx('Departure Airline'), depFl:  cidx('Departure Flight#'),
  };

  const players = [];
  const departures = [];
  const allergyAlerts = [];

  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const name = C.name >= 0 ? cv(r[C.name]) : '';
    if (!name) continue;

    const g = k => (C[k] !== undefined && C[k] >= 0 && r[C[k]] !== undefined) ? cv(r[C[k]]) : '';

    const depDate    = C.depDate >= 0 ? parseDate(r[C.depDate]) : '';
    const depTime    = C.depTime >= 0 ? parseTime(r[C.depTime]) : '';
    const depAirport = g('depApt');
    const depAirline = g('depAl');
    const depFlight  = normFlight(C.depFl >= 0 ? r[C.depFl] : '');

    const arrDate    = C.arrDate >= 0 ? parseDate(r[C.arrDate]) : '';
    const arrTime    = C.arrTime >= 0 ? parseTime(r[C.arrTime]) : '';
    const arrFlight  = normFlight(C.arrFl >= 0 ? r[C.arrFl] : '');

    const pickupRaw  = C.pickup >= 0 ? cv(r[C.pickup]) : '';
    const pickupStr  = pickupRaw === 'No Ride Needed' ? 'No Ride Needed' : parseTime(pickupRaw);

    const ageStr  = g('age');
    const ageNum  = parseFloat(ageStr) || 0;
    const isMinor = ageNum > 0 && ageNum < 18;

    const captainName = g('cap');
    const isCapt = !!(captainName && captainName.toLowerCase().trim() === name.toLowerCase().trim());

    const jerseyRaw = g('jersey');
    const jerseyNum = jerseyRaw ? (String(parseInt(jerseyRaw) || jerseyRaw)) : '';

    const alg = allergyMap[name.toLowerCase().trim()] || {};

    const nameParts = name.trim().split(/\s+/);
    const fn = nameParts[0] || '';
    const ln = nameParts.slice(1).join(' ');

    players.push({
      fullName: name, firstName: fn, lastName: ln,
      phone: g('phone'), email: g('email'),
      team: g('team'), gender: g('gender'), dob: g('dob'),
      age: ageStr, ageLevel: g('level'),
      jerseyNumber: jerseyNum, jerseySize: g('size'), position: g('pos'),
      captainName, isCapt, isMinor,
      chaperoneName: g('chapN'), chaperoneEmail: g('chapE'), chaperonePhone: g('chapP'),
      emergencyContact: g('emerN'), emergencyPhone: g('emerP'),
      inHotel: g('hotel') === 'Yes', shuttle: g('shuttle') === 'Yes',
      arrivalDate: arrDate, arrivalTime: arrTime,
      arrivalAirport: g('arrApt'), arrivalAirline: g('arrAl'), arrivalFlight: arrFlight,
      pickupTime: pickupStr, volunteerName: g('vol'), volunteerPhone: g('volPh'),
      departureDate: depDate, departureTime: depTime,
      departureAirport: depAirport, departureAirline: depAirline, departureFlight: depFlight,
      allergies: alg.allergy || '', dietary: alg.dietary || '', specialNeeds: alg.specialNeeds || '',
      arrivals: [], departures: [],
      id: `P${String(i).padStart(3,'0')}`
    });

    if (alg.allergy || alg.dietary || alg.specialNeeds) {
      allergyAlerts.push({ name, allergy: alg.allergy || '', dietary: alg.dietary || '', specialNeeds: alg.specialNeeds || '' });
    }

    // Assign departure to correct tab (DEP 5TH / 6TH / 7TH)
    if (depAirline && depDate) {
      const dayMatch = depDate.match(/-(\d{2})$/);
      const dayNum = dayMatch ? parseInt(dayMatch[1]) : 0;
      if (dayNum >= 5 && dayNum <= 7) {
        const sheetName = dayNum === 5 ? 'DEP 5TH' : dayNum === 6 ? 'DEP 6TH' : 'DEP 7TH';
        departures.push({
          sheet: sheetName,
          firstName: fn, lastName: ln, fullName: name,
          phone: g('phone'), date: depDate, time: depTime,
          airport: depAirport, airline: depAirline, flightNum: depFlight,
          pickupTime: '', volunteerName: '', volunteerPhone: '',
          commDone: '', dropoffDone: ''
        });
      }
    }
  }

  return { players, allergyAlerts }; // departures now parsed from Travel Form
}

// ---- Master fetch function ----
async function fetchAllSheets() {
  // Fetch all tabs from the new master roster Google Sheet
  const results = await Promise.allSettled([
    fetchCSV(GS.MASTER, 'IAH-A'),        // 0: IAH arrivals (103 passengers)
    fetchCSV(GS.MASTER, 'Hobby-A'),      // 1: Hobby arrivals (11 passengers)
    fetchCSV(GS.MASTER, 'All'),          // 2: All 304 athletes
    fetchCSV(GS.MASTER, 'Allergy'),      // 3: Allergy & dietary data
    fetchCSV(GS.MASTER, 'Travel Form'),  // 4: Athlete departure submissions (most accurate)
  ]);

  const getOrThrow = (idx, name) => {
    if (results[idx].status === 'rejected') throw new Error(`Sheet "${name}" unreachable`);
    return results[idx].value;
  };
  const getOrEmpty = (idx) => results[idx].status === 'fulfilled' ? results[idx].value : [];

  const rowsIAH        = getOrThrow(0, 'IAH-A');
  const rowsHobby      = getOrThrow(1, 'Hobby-A');
  const rowsAll        = getOrThrow(2, 'All');
  const rowsAllergies  = getOrEmpty(3);
  const rowsTravelForm = getOrEmpty(4);

  const { arrivals: iahList, seen } = parseArrivalIAH(rowsIAH);
  const hobbyList = parseArrivalHobby(rowsHobby, seen);
  const allArrivals = [...iahList, ...hobbyList];

  const { players, allergyAlerts } = parseAllSheet(rowsAll, rowsAllergies);
  // Use Travel Form for departures (direct athlete submissions — most accurate)
  const departures = (rowsTravelForm.length > 1 ? parseTravelForm(rowsTravelForm) : null) || ISCC_DATA.departures;

  return {
    staff: ISCC_DATA.staff,
    players,
    arrivals_iah: allArrivals.filter(a => a.airport !== 'HOBBY').sort((a,b)=>(a.time||'99').localeCompare(b.time||'99')),
    arrivals_hobby: allArrivals.filter(a => a.airport === 'HOBBY').sort((a,b)=>(a.time||'99').localeCompare(b.time||'99')),
    arrivals_all: allArrivals,
    departures,
    allergyAlerts,
    allergies: allergyAlerts.filter(a => a.allergy).map(a => ({name: a.name, detail: a.allergy, team: ''})),
    dietary:   allergyAlerts.filter(a => a.dietary).map(a => ({name: a.name, detail: a.dietary, team: ''})),
    teams: ISCC_DATA.teams,
  };
}

// ---- Parse uploaded master roster Excel ----
function parseRosterExcel(arrayBuffer) {
  const wb = XLSX.read(arrayBuffer, {type:'array', cellDates:true});
  const ws = wb.Sheets['All'] || wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, dateNF:'YYYY-MM-DD'});
  if (!rows || rows.length < 2) throw new Error('Could not find data in the All sheet');

  // Find header row
  let hdr = 0;
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    if (rows[i].some(c => String(c||'').toLowerCase().includes('athlete name'))) { hdr = i; break; }
  }
  const headers = rows[hdr].map(h => String(h||'').trim());
  const col = (name) => headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));

  const C = {
    name: col('Athlete Name'), srcTab: col('Source Tab'), pos: col('Position'),
    team: col('Team Name'), gender: col('Gender'), dob: col('DOB'), age: col('Age'),
    ageLevel: col('Age Level'), jerseySize: col('Jersey Size'), jerseyNum: col('Jersey Number'),
    captain: col('Captain Name'), email: col('Athlete Email'), phone: col('Athlete Phone'),
    chapName: col('Chaperone Name'), chapEmail: col('Chaperone Email'), chapPhone: col('Chaperone Phone'),
    ecName: col('Emergency Contact Name'), ecPhone: col('Emergency Contact Phone'),
    hotel: col('Hotel Yes/No'), shuttle: col('Shuttle Yes/No'),
    travelMethod: col('Travel Method'), arrDate: col('Arrival Date Detail'),
    arrTime: col('Arrival Time'), arrAirport: col('Arrival Airport'),
    arrAirline: col('Arrival Airline'), arrFlight: col('Arrival Flight'),
    pickupTime: col('PICK UP TIME'), volName: col('VOLUNTEER NAME'), volPhone: col('PHONE NUMBER'),
    transportTo: col('Transport To'),
    depDate: col('Departure Date Detail'), depTime: col('Departure Time'),
    depAirport: col('Departure Airport'), depAirline: col('Departure Airline'), depFlight: col('Departure Flight'),
    allergy: col('Allergy'),
  };

  const cv2 = (r, i) => { if (i < 0 || i >= r.length) return ''; const v = r[i]; return (v===null||v===undefined||String(v).trim().toLowerCase()==='nan') ? '' : String(v).trim(); };
  const parseAirport = (a) => { const u=a.toUpperCase(); return u.includes('HOBBY')||u.includes('HOU')?'HOBBY':u.includes('IAH')||u.includes('GEORGE')||u.includes('INTERCONTINENTAL')?'IAH':a.slice(0,15); };
  const normFlt = (f) => { let n=f.toUpperCase().replace(/\s+/g,'').replace(/\t/g,''); if(!/\d/.test(n))return''; return n.replace(/^DELTA(?=[A-Z0-9])/,'DL').replace(/^UNITED(?=[0-9])/,'UA').replace(/^AMERICAN(?=[0-9])/,'AA'); };

  const athletes = [];
  for (let i = hdr + 1; i < rows.length; i++) {
    const r = rows[i];
    const name = cv2(r, C.name);
    if (!name) continue;
    const parts = name.trim().split(' ');
    const fn = parts[0], ln = parts.slice(1).join(' ');
    let ageNum = parseFloat(cv2(r, C.age));
    const isMinor = !isNaN(ageNum) && ageNum < 18;
    const arrAirport = parseAirport(cv2(r, C.arrAirport) || '');
    const depAirport = parseAirport(cv2(r, C.depAirport) || '');
    const arrFlight = normFlt(cv2(r, C.arrFlight));
    const depFlight = normFlt(cv2(r, C.depFlight));
    const inHotel = cv2(r, C.hotel).toLowerCase() === 'yes';
    const a = {
      fullName: name, firstName: fn, lastName: ln,
      sourceTab: cv2(r,C.srcTab), position: cv2(r,C.pos), team: cv2(r,C.team),
      gender: cv2(r,C.gender), dob: cv2(r,C.dob), age: cv2(r,C.age), ageLevel: cv2(r,C.ageLevel),
      jerseySize: cv2(r,C.jerseySize), jerseyNumber: cv2(r,C.jerseyNum), captainName: cv2(r,C.captain),
      email: cv2(r,C.email), phone: cv2(r,C.phone),
      chaperoneName: cv2(r,C.chapName), chaperoneEmail: cv2(r,C.chapEmail), chaperonePhone: cv2(r,C.chapPhone),
      emergencyContact: cv2(r,C.ecName), emergencyPhone: cv2(r,C.ecPhone),
      inHotel, shuttle: cv2(r,C.shuttle).toLowerCase()==='yes',
      travelMethod: cv2(r,C.travelMethod), isMinor,
      arrivalDate: cv2(r,C.arrDate), arrivalTime: cv2(r,C.arrTime), arrivalAirport: arrAirport,
      arrivalAirline: cv2(r,C.arrAirline), arrivalFlight: arrFlight,
      pickupTime: cv2(r,C.pickupTime), volunteerName: cv2(r,C.volName), volunteerPhone: cv2(r,C.volPhone),
      transportTo: cv2(r,C.transportTo),
      departureDate: cv2(r,C.depDate), departureTime: cv2(r,C.depTime), departureAirport: depAirport,
      departureAirline: cv2(r,C.depAirline), departureFlight: depFlight,
      allergies: cv2(r,C.allergy), dietary: '', specialNeeds: '',
      arrivals: arrFlight||arrAirport ? [{airport:arrAirport,airline:cv2(r,C.arrAirline),flightNum:arrFlight,time:cv2(r,C.arrTime),date:cv2(r,C.arrDate),terminal:arrAirport}] : [],
      departures: depFlight||depAirport ? [{airport:depAirport,airline:cv2(r,C.depAirline),flightNum:depFlight,time:cv2(r,C.depTime),date:cv2(r,C.depDate)}] : [],
    };
    athletes.push(a);
  }

  const players = athletes.map((a,i)=>({...a, id:`P${String(i+1).padStart(3,'0')}`}));
  const arrivals_iah = players.filter(p=>p.arrivalAirport==='IAH'&&(p.arrivalFlight||p.arrivalAirline)).map(p=>({...p,category:p.isMinor?'kid':'adult'})).sort((a,b)=>(a.arrivalTime||'99').localeCompare(b.arrivalTime||'99'));
  const arrivals_hobby = players.filter(p=>p.arrivalAirport==='HOBBY'&&(p.arrivalFlight||p.arrivalAirline)).map(p=>({...p,category:p.isMinor?'kid':'adult'})).sort((a,b)=>(a.arrivalTime||'99').localeCompare(b.arrivalTime||'99'));
  const departures = players.filter(p=>p.departureFlight||p.departureAirline).map(p=>({...p,sheet:'DEP'}));
  const teamMap = {};
  players.forEach(p=>{if(p.team&&!teamMap[p.team])teamMap[p.team]={name:p.team,captain:p.captainName,ageLevel:p.ageLevel};});
  return {
    staff: (window.__ISCC_STAFF__ || ISCC_DATA.staff),
    players, arrivals_iah, arrivals_hobby, arrivals_all:[...arrivals_iah,...arrivals_hobby],
    departures, allergies: players.filter(p=>p.allergies).map(p=>({name:p.fullName,detail:p.allergies,team:p.team})),
    dietary: players.filter(p=>p.dietary).map(p=>({name:p.fullName,detail:p.dietary,team:p.team})),
    teams: Object.values(teamMap),
  };
}

function getFlightLink(airline, flightNum) {
  const num = (flightNum||'').replace(/\s+/g,'').toUpperCase();
  const air = (airline||'').toLowerCase();
  if (!num || num.length < 2) return null;
  if (!/\d/.test(num)) return null; // booking codes / no digits = invalid
  // FlightAware uses ICAO 3-letter codes (UAL not UA, DAL not DL, SWA not WN, etc.)
  if (air.includes('united') || air.includes('ua'))
    return `https://www.flightaware.com/live/flight/UAL${num.replace(/^UA/,'')}`;
  if (air.includes('frontier') || air.includes('f9'))
    return `https://www.flightaware.com/live/flight/FFT${num.replace(/^F9/,'')}`;
  if (air.includes('delta') || air.includes('dl'))
    return `https://www.flightaware.com/live/flight/DAL${num.replace(/^DL/,'')}`;
  if (air.includes('american') || air.includes('aa'))
    return `https://www.flightaware.com/live/flight/AAL${num.replace(/^AA/,'')}`;
  if (air.includes('southwest') || air.includes('wn'))
    return `https://www.flightaware.com/live/flight/SWA${num.replace(/^WN/,'')}`;
  if (air.includes('air canada') || air.includes(' ac'))
    return `https://www.flightaware.com/live/flight/ACA${num.replace(/^AC/,'')}`;
  if (air.includes('jetblue') || air.includes('b6'))
    return `https://www.flightaware.com/live/flight/JBU${num.replace(/^B6/,'')}`;
  return `https://www.flightaware.com/live/flight/${num}`;
}

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length < 3) return d;
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(parts[1])]} ${parseInt(parts[2])}`;
}

function now() { return new Date(); }
function timeStr() {
  const n = now();
  return n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function dateStr() {
  const n = now();
  return n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}

function ArrivalsView({data, statuses, setStatuses}) {

  const [selectedFlight, setSelectedFlight] = useState(null);

  const arrivals = tab === 'iah' ? data.arrivals_iah : data.arrivals_hobby;
  const filtered = arrivals.filter(a => {
    const q = search.toLowerCase();
    return !q || a.fullName.toLowerCase().includes(q) || (a.flightNum||'').toLowerCase().includes(q)
      || (a.volunteerName||'').toLowerCase().includes(q) || (a.airline||'').toLowerCase().includes(q);
  });

  // Group by flight for summary
  const byFlight = {};
  arrivals.forEach(a => {
    const key = `${a.airline}_${a.flightNum}_${a.time}`;
    if (!byFlight[key]) byFlight[key] = {airline:a.airline,flightNum:a.flightNum,time:a.time,date:a.date,airport:a.airport,passengers:[]};
    byFlight[key].passengers.push(a);

  const updateStatus = (pid, field, val) => {
    const next = {...statuses, [pid]:{...(statuses[pid]||{}), [field]:val}};

    localStorage.setItem(STATUS_KEY, JSON.stringify(next));

}

// DEPARTURES VIEW
// ============================================================
function DeparturesView({data, statuses, setStatuses}) {
  const [tab, setTab] = useState('5th');
  const [search, setSearch] = useState('');

  const sheetMap = {'5th':'DEP 5TH','6th':'DEP 6TH','7th':'DEP 7TH'};
  const departures = data.departures.filter(d=>d.sheet===sheetMap[tab]);
  const filtered = departures.filter(d => {
    const q = search.toLowerCase();
    return !q || d.fullName.toLowerCase().includes(q) || (d.flightNum||'').toLowerCase().includes(q);
  });

  const updateStatus = (pid, field, val) => {
    const next = {...statuses, [pid]:{...(statuses[pid]||{}), [field]:val}};
    setStatuses(next);
    localStorage.setItem(STATUS_KEY, JSON.stringify(next));
  };

  const exportCSV = () => {
    const rows = [['Name','Phone','Date','Time','Airport','Airline','Flight#','Pickup Time','Volunteer','Vol Phone','Comm Done','Dropoff Done']];
    filtered.forEach(d => {
      const pid = `dep_${d.firstName}_${d.lastName}_${d.flightNum}`;
      const s = statuses[pid]||{};
      rows.push([d.fullName,d.phone,d.date,d.time,d.airport,d.airline,d.flightNum,d.pickupTime,d.volunteerName,d.volunteerPhone,s.commDone?'Y':'',s.dropoffDone?'Y':'']);
    });
    const csv = rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`departures_apr${tab}_${Date.now()}.csv`; a.click();
  };

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-heading">🛫 Departures</div>
          <div className="section-sub">Manage drop-offs, flight confirmations, and volunteer assignments</div>
        </div>
        <button className="btn btn-ghost btn-sm" onClick={exportCSV}>📥 Export CSV</button>
      </div>

      <div className="tabs">
        {[['5th','Apr 5'],['6th','Apr 6'],['7th','Apr 7']].map(([key,label])=>(
          <div key={key} className={`tab ${tab===key?'active':''}`} onClick={()=>setTab(key)}>
            {label} ({data.departures.filter(d=>d.sheet===sheetMap[key]).length})
          </div>
        ))}
      </div>

      <div className="table-wrap">
        <div className="table-header">
          <div>
            <div className="table-title">April {tab==='5th'?'5':'6th'?'6':tab==='6th'?'6':'7'} Departures</div>
            <div className="table-sub">{filtered.length} passengers</div>
          </div>
          <div className="search-bar">
            <span className="search-icon">🔍</span>
            <input placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
        </div>
        <table>
          <thead><tr>
            <th>Passenger</th><th>Depart Time</th><th>Airport</th><th>Flight</th>
            <th>Pickup Time</th><th>Volunteer</th><th>Status</th>
          </tr></thead>
          <tbody>
            {filtered.length === 0
              ? <tr><td colSpan={7} style={{textAlign:'center',padding:40,color:'var(--text-dim)'}}>No departures for this date</td></tr>
              : filtered.sort((a,b)=>a.time.localeCompare(b.time)).map((d,i)=>{
                const pid = `dep_${d.firstName}_${d.lastName}_${d.flightNum}`;
                const s = statuses[pid]||{};
                const link = getFlightLink(d.airline, d.flightNum);
                return (
                  <tr key={i}>
                    <td>
                      <div style={{fontWeight:600}}>{d.fullName}</div>
                      {d.phone && <a href={`tel:${d.phone}`} style={{fontSize:12,color:'var(--cyan)'}}>{d.phone}</a>}
                    </td>
                    <td style={{fontWeight:700,fontSize:15}}>{d.time||'—'}</td>
                    <td><span className={`badge ${d.airport==='IAH'?'blue':'amber'}`}>{d.airport||'—'}</span></td>
                    <td>
                      {link
                        ? <a href={link} target="_blank" className="flight-link">{d.airline} {d.flightNum}</a>
                        : <span>{d.airline} {d.flightNum||'—'}</span>}
                    </td>
                    <td style={{color:'var(--green)',fontWeight:600}}>{d.pickupTime||'—'}</td>
                    <td>
                      {d.volunteerName
                        ? <><div style={{fontWeight:600}}>{d.volunteerName}</div><a href={`tel:${d.volunteerPhone}`} style={{fontSize:12,color:'var(--cyan)'}}>{d.volunteerPhone}</a></>
                        : <span style={{color:'var(--red)',fontSize:12}}>⚠ Unassigned</span>}
                    </td>
                    <td>
                      <div style={{display:'flex',flexDirection:'column',gap:4}}>
                        <label className="toggle">
                          <div className={`toggle-switch ${s.commDone?'on':''}`} onClick={()=>updateStatus(pid,'commDone',!s.commDone)}></div>
                          <span style={{fontSize:11}}>📞 Comm</span>
                        </label>
                        <label className="toggle">
                          <div className={`toggle-switch ${s.dropoffDone?'on':''}`} onClick={()=>updateStatus(pid,'dropoffDone',!s.dropoffDone)}></div>
                          <span style={{fontSize:11}}>🚗 Dropoff</span>
                        </label>
                      </div>
                    </td>

                );

        </table>
      </div>
    </div>
  );
}

function FlightSummaryView({data}) {
  const [tab, setTab] = useState('arrivals');
  const [dateFilter, setDateFilter] = useState('all');

  const allFlights = useMemo(() => {
    const map = {};
    const add = (list, type) => {
      list.forEach(f => {
        const key = `${type}_${f.airline}_${f.flightNum}_${f.date}_${f.time}`;
        if (!map[key]) map[key] = {...f, type, passengers:[]};
        if (!map[key].passengers.find(p=>p.fullName===f.fullName))
          map[key].passengers.push({fullName:f.fullName,phone:f.phone,category:f.category||''});
      });
    };
    if (tab === 'arrivals') {
      add(data.arrivals_iah, 'arrival-IAH');
      add(data.arrivals_hobby, 'arrival-HOBBY');
    } else {
      add(data.departures, 'departure');
    }
    return Object.values(map).sort((a,b)=>{
      const dc = a.date.localeCompare(b.date);
      if (dc!==0) return dc;
      return a.time.localeCompare(b.time);
    });
  }, [tab]);

  const filtered = dateFilter === 'all' ? allFlights : allFlights.filter(f=>f.date===dateFilter);
  const dates = [...new Set(allFlights.map(f=>f.date).filter(Boolean))].sort();

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-heading">🗓 Flight Summary</div>
          <div className="section-sub">All flights grouped — click to track on FlightAware</div>
        </div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <div className="tabs" style={{marginBottom:0}}>
          <div className={`tab ${tab==='arrivals'?'active':''}`} onClick={()=>setTab('arrivals')}>Arrivals</div>
          <div className={`tab ${tab==='departures'?'active':''}`} onClick={()=>setTab('departures')}>Departures</div>
        </div>
        <div style={{display:'flex',gap:6,marginLeft:8}}>
          <button className={`btn btn-sm ${dateFilter==='all'?'btn-primary':'btn-ghost'}`} onClick={()=>setDateFilter('all')}>All Dates</button>
          {dates.map(d=>(
            <button key={d} className={`btn btn-sm ${dateFilter===d?'btn-primary':'btn-ghost'}`} onClick={()=>setDateFilter(d)}>{formatDate(d)}</button>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gap:10}}>
        {filtered.map((f,i)=>{
          const link = getFlightLink(f.airline, f.flightNum);
          const airport = f.terminal || f.airport;
          const type = f.type;
          return (
            <div key={i} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 18px'}}>
              <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                <div style={{fontSize:24}}>{type.startsWith('arrival')?'🛬':'🛫'}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                    <span style={{fontSize:16,fontWeight:700}}>{f.airline} {f.flightNum||'—'}</span>
                    <span className={`badge ${airport==='IAH'?'blue':'amber'}`}>{airport}</span>
                    {link && <span className="badge cyan" style={{fontSize:10}}>TRACKABLE</span>}
                  </div>
                  <div style={{fontSize:13,color:'var(--text-dim)',margin:'4px 0'}}>
                    {formatDate(f.date)} · <strong style={{color:'var(--text-bright)'}}>{f.time||'—'}</strong>
                    {f.pickupTime && f.pickupTime!=='No Ride Needed' && <> · Pickup: <strong style={{color:'var(--green)'}}>{f.pickupTime}</strong></>}
                    {f.volunteerName && <> · 🚗 {f.volunteerName}</>}
                  </div>
                  <div style={{fontSize:12,color:'var(--text-dim)'}}>
                    <strong style={{color:'var(--text-bright)'}}>{f.passengers.length} passenger{f.passengers.length!==1?'s':''}:</strong>{' '}
                    {f.passengers.map(p=>(
                      <span key={p.fullName} style={{marginRight:8}}>
                        {p.fullName}{(p.category==='Kid'||p.category==='kid')?<span className="minor-flag" style={{marginLeft:3}}>M</span>:''}
                      </span>
                    ))}
                  </div>
                </div>
                {link && (
                  <a href={link} target="_blank" className="btn btn-blue btn-sm">
                    🛩 Track Live
                  </a>
                )}
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div className="empty-state"><div className="empty-icon">✈️</div><div>No flights for selected date</div></div>
        )}
      </div>
    </div>
  );
}

function TeamsView({data}) {
  const [search, setSearch] = useState('');
  const teams = useMemo(() => {
    const grouped = {};
    (data.players||[]).forEach(p => {
      const t = p.team || 'Unassigned';
      if (!grouped[t]) grouped[t] = {name:t, captain:p.captainName||'', ageLevel:p.ageLevel||'', players:[]};
      grouped[t].players.push(p);
    });
    return Object.values(grouped)
      .filter(t => !search || t.name.toLowerCase().includes(search.toLowerCase()))
      .sort((a,b)=>a.name.localeCompare(b.name));
  }, [data.players, search]);

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-heading">⚽ Teams</div>
          <div className="section-sub">{teams.length} teams · {(data.players||[]).length} total athletes</div>
        </div>
        <div className="search-bar">
          <span className="search-icon">🔍</span>
          <input placeholder="Search teams..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
        {teams.map(team=>(
          <div key={team.name} className="table-wrap" style={{marginBottom:0}}>
            <div className="table-header">
              <div>
                <div className="table-title">⚽ {team.name}</div>
                <div className="table-sub">{team.players.length} athletes · {team.ageLevel} · Captain: {team.players.find(p=>p.position?.toLowerCase()==='captain')?.fullName || team.captain || '—'}</div>
              </div>
              <span className="badge blue">{team.players.length}</span>
            </div>
            <div style={{padding:'8px 16px 12px'}}>
              {team.players.map((p,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:i<team.players.length-1?'1px solid var(--border)':'none'}}>
                  <span style={{fontSize:11,color:'var(--text-dim)',width:24,textAlign:'right',flexShrink:0}}>#{p.jerseyNumber||'—'}</span>
                  <div className="profile-avatar" style={{width:28,height:28,fontSize:11}}>{p.firstName[0]}{p.lastName?.[0]||''}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'var(--text-bright)'}}>{p.fullName}
                      {p.position?.toLowerCase()==='captain'&&<span style={{marginLeft:6,fontSize:10,color:'var(--amber)',fontWeight:700}}>©</span>}
                      {p.isMinor&&<span className="minor-flag" style={{marginLeft:4,fontSize:9}}>MINOR</span>}
                    </div>
                    {p.phone&&<div style={{fontSize:11,color:'var(--text-dim)'}}>{p.phone}</div>}
                  </div>
                  {p.inHotel&&<span style={{fontSize:10,color:'var(--purple)'}}>🏨</span>}
                  {p.allergies&&<span style={{fontSize:10,color:'var(--red)'}}>⚠</span>}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function RosterUpload({onUploaded, onClose}) {
  const [status, setStatus] = useState('idle'); // idle | loading | done | error
  const [msg, setMsg] = useState('');
  const fileRef = useRef(null);

  const handleFile = async (file) => {
    if (!file) return;
    setStatus('loading');
    setMsg('Parsing roster...');
    try {
      const ab = await file.arrayBuffer();
      const parsed = parseRosterExcel(ab);
      localStorage.setItem(ROSTER_KEY, JSON.stringify(parsed));
      setStatus('done');
      setMsg(`✅ Loaded ${parsed.players.length} athletes from ${parsed.teams?.length||0} teams.`);
      setTimeout(()=>{ onUploaded(parsed); onClose(); }, 1500);
    } catch(e) {
      setStatus('error');
      setMsg('❌ Error: ' + e.message);
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">📂 Upload Master Roster</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{marginBottom:16,fontSize:13,color:'var(--text-dim)',lineHeight:1.6}}>
            Upload the <strong style={{color:'var(--text-bright)'}}>ISCC Logistics - Final Roster</strong> Excel file.
            Data is processed entirely in your browser — nothing is sent to any server.
          </div>
          {status==='idle'&&(
            <div
              style={{border:'2px dashed var(--border)',borderRadius:12,padding:'32px 24px',textAlign:'center',cursor:'pointer',transition:'border-color .2s'}}
              onClick={()=>fileRef.current?.click()}
              onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--green)'}}
              onDragLeave={e=>{e.currentTarget.style.borderColor='var(--border)'}}
              onDrop={e=>{e.preventDefault();handleFile(e.dataTransfer.files[0])}}>
              <div style={{fontSize:36,marginBottom:8}}>📊</div>
              <div style={{fontWeight:700,color:'var(--text-bright)',marginBottom:4}}>Drop Excel file here</div>
              <div style={{fontSize:12,color:'var(--text-dim)'}}>or click to browse</div>
              <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}}
                onChange={e=>handleFile(e.target.files[0])}/>
            </div>
          )}
          {status==='loading'&&<div style={{textAlign:'center',padding:32,color:'var(--blue)'}}><span style={{fontSize:28,animation:'spin 1s linear infinite',display:'inline-block'}}>⟳</span><div style={{marginTop:12}}>{msg}</div></div>}
          {status==='done'&&<div style={{textAlign:'center',padding:32,color:'var(--green)',fontSize:15,fontWeight:600}}>{msg}</div>}
          {status==='error'&&<div style={{padding:16,background:'rgba(239,68,68,.1)',borderRadius:8,color:'var(--red)'}}>{msg}<button className="btn btn-ghost btn-sm" style={{marginTop:12}} onClick={()=>setStatus('idle')}>Try again</button></div>}
        </div>
      </div>
    </div>
  );
}

function IncidentsView({data, incidents, setIncidents, syncStatus, onRefresh}) {
  const [showForm, setShowForm] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');

  const filtered = incidents.filter(inc => {
    const q = search.toLowerCase();
    const matchQ = !q || inc.personInvolved?.toLowerCase().includes(q) || inc.description?.toLowerCase().includes(q) || inc.type?.toLowerCase().includes(q);
    const matchS = statusFilter === 'all' || inc.status === statusFilter;
    return matchQ && matchS;
  });

  const saveIncident = (data) => {
    let inc, next;
    if (data.id) {
      inc = {...data, updatedAt: new Date().toISOString()};
      next = incidents.map(i=>i.id===data.id ? inc : i);
    } else {
      inc = {...data, id:`INC-${Date.now()}`, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()};
      next = [inc, ...incidents];
    }
    setIncidents(next);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    upsertIncidentToSheet(inc); // write to shared sheet (non-blocking)
    setShowForm(false);
    setEditItem(null);
  };

  const deleteIncident = (id) => {
    if (!confirm('Delete this incident?')) return;
    const next = incidents.filter(i=>i.id!==id);
    setIncidents(next);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    deleteIncidentFromSheet(id); // remove from shared sheet (non-blocking)
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(incidents,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`iscc_incidents_${Date.now()}.json`; a.click();
  };

  const exportCSV = () => {
    const rows = [['ID','DateTime','Type','Level','Status','Person Involved','Site','Reported By','Description','Escalation','Resolution','Created']];
    incidents.forEach(i=>rows.push([i.id,i.dateTime,i.type,i.level,i.status,i.personInvolved,i.site,i.reportedBy,i.description,i.escalation,i.resolution,i.createdAt]));
    const csv = rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`iscc_incidents_${Date.now()}.csv`; a.click();
  };

  const levelColor = l => l==='Critical'?'red':l==='High'?'amber':l==='Medium'?'blue':'gray';
  const statusColor = s => s==='Resolved'?'green':s==='Escalated'?'red':s==='In Progress'?'amber':'gray';

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-heading">🚨 Incident Tracker</div>
          <div className="section-sub">
            {incidents.length} total · {incidents.filter(i=>i.status!=='Resolved').length} open
            {SCRIPT_URL
              ? <span style={{marginLeft:10,fontSize:11,color: syncStatus==='synced'?'var(--green)':syncStatus==='error'?'var(--red)':'var(--text-dim)'}}>
                  {syncStatus==='synced'?'● Live sync':syncStatus==='error'?'⚠ Sync error':'● Connecting…'}
                </span>
              : <span style={{marginLeft:10,fontSize:11,color:'var(--amber)'}}>⚠ Local only</span>
            }
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={exportJSON}>💾 Export JSON</button>
          <button className="btn btn-ghost btn-sm" onClick={exportCSV}>📥 Export CSV</button>
          {SCRIPT_URL && <button className="btn btn-ghost btn-sm" onClick={onRefresh} title="Pull latest incidents from shared sheet">↻ Sync</button>}
          <button className="btn btn-primary" onClick={()=>{setEditItem(null);setShowForm(true)}}>+ Log Incident</button>
        </div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {['all','Open','In Progress','Escalated','Resolved'].map(s=>(
          <button key={s} className={`btn btn-sm ${statusFilter===s?'btn-primary':'btn-ghost'}`} onClick={()=>setStatusFilter(s)}>
            {s==='all'?'All':s} {s!=='all'?`(${incidents.filter(i=>i.status===s).length})`:`(${incidents.length})`}
          </button>
        ))}
        <div className="search-bar" style={{marginLeft:'auto'}}>
          <span className="search-icon">🔍</span>
          <input placeholder="Search incidents..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">✅</div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>No incidents</div>
          <div>All clear — log an incident using the button above</div>
        </div>
      ) : (
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>ID</th><th>Date/Time</th><th>Type</th><th>Level</th>
              <th>Person(s) Involved</th><th>Site</th><th>Status</th><th>Actions</th>
            </tr></thead>
            <tbody>
              {filtered.map((inc,i)=>(
                <tr key={i} className={`inc-row-${inc.status==='Resolved'?'resolved':'open'}`}>
                  <td><span style={{fontFamily:'monospace',fontSize:12,color:'var(--text-dim)'}}>{inc.id}</span></td>
                  <td style={{whiteSpace:'nowrap',fontSize:13}}>{inc.dateTime}</td>
                  <td>{inc.type}</td>
                  <td><span className={`badge ${levelColor(inc.level)}`}>{inc.level}</span></td>
                  <td>
                    <div style={{fontWeight:600,fontSize:13}}>{inc.personInvolved||'—'}</div>
                    <div style={{fontSize:12,color:'var(--text-dim)'}}>{inc.description?.substring(0,60)}{inc.description?.length>60?'...':''}</div>
                  </td>
                  <td style={{fontSize:13}}>{inc.site||'—'}</td>
                  <td><span className={`badge ${statusColor(inc.status)}`}>{inc.status}</span></td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setEditItem(inc);setShowForm(true)}}>✏</button>
                      <button className="btn btn-sm" style={{background:'var(--red)',color:'#fff'}} onClick={()=>deleteIncident(inc.id)}>🗑</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {showForm && (
        <IncidentForm
          item={editItem}
          data={data}
          onSave={saveIncident}
          onCancel={()=>{setShowForm(false);setEditItem(null)}}
        />
      )}
    </div>
  );
}

function IncidentForm({item, data, onSave, onCancel}) {
  const [form, setForm] = useState({
    id: item?.id||'',
    dateTime: item?.dateTime || new Date().toISOString().slice(0,16),
    type: item?.type||'Medical',
    level: item?.level||'Low',
    status: item?.status||'Open',
    personInvolved: item?.personInvolved||'',
    personContact: item?.personContact||'',
    reportedBy: item?.reportedBy||'',
    reporterPhone: item?.reporterPhone||'',
    site: item?.site||'',
    sport: item?.sport||'',
    description: item?.description||'',
    escalation: item?.escalation||'',
    ccNotes: item?.ccNotes||'',
    resolution: item?.resolution||'',
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const playerNames = data.players.map(p=>p.fullName).sort();

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" style={{maxWidth:800}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">{item?'Edit Incident':'🚨 Log New Incident'}</div>
          <button className="btn btn-ghost btn-sm" onClick={onCancel}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group">
              <label className="form-label">Date & Time</label>
              <input className="form-input" type="datetime-local" value={form.dateTime} onChange={e=>set('dateTime',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Incident Type</label>
              <select className="form-select" value={form.type} onChange={e=>set('type',e.target.value)}>
                {INC_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Severity Level</label>
              <select className="form-select" value={form.level} onChange={e=>set('level',e.target.value)}>
                {INC_LEVELS.map(l=><option key={l}>{l}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Status</label>
              <select className="form-select" value={form.status} onChange={e=>set('status',e.target.value)}>
                {INC_STATUS.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Person(s) Involved</label>
              <input className="form-input" list="player-names" value={form.personInvolved} onChange={e=>set('personInvolved',e.target.value)} placeholder="Name or free text"/>
              <datalist id="player-names">{playerNames.map(n=><option key={n} value={n}/>)}</datalist>
            </div>
            <div className="form-group">
              <label className="form-label">Their Contact</label>
              <input className="form-input" value={form.personContact} onChange={e=>set('personContact',e.target.value)} placeholder="Phone number"/>
            </div>
            <div className="form-group">
              <label className="form-label">Reported By</label>
              <input className="form-input" list="staff-names" value={form.reportedBy} onChange={e=>set('reportedBy',e.target.value)} placeholder="Volunteer name"/>
              <datalist id="staff-names">{data.staff.map(s=><option key={s.name} value={s.name}/>)}</datalist>
            </div>
            <div className="form-group">
              <label className="form-label">Reporter Phone</label>
              <input className="form-input" value={form.reporterPhone} onChange={e=>set('reporterPhone',e.target.value)} placeholder="Phone number"/>
            </div>
            <div className="form-group">
              <label className="form-label">Incident Site</label>
              <select className="form-select" value={form.site} onChange={e=>set('site',e.target.value)}>
                <option value="">Select site...</option>
                {INC_SITES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Sport / Event</label>
              <input className="form-input" value={form.sport} onChange={e=>set('sport',e.target.value)} placeholder="e.g. Soccer U14, Opening Ceremony"/>
            </div>
            <div className="form-group full">
              <label className="form-label">Incident Description</label>
              <textarea className="form-textarea" rows={4} value={form.description} onChange={e=>set('description',e.target.value)} placeholder="Detailed description of what happened..."/>
            </div>
            <div className="form-group full">
              <label className="form-label">Escalation (if any)</label>
              <input className="form-input" value={form.escalation} onChange={e=>set('escalation',e.target.value)} placeholder="Who was this escalated to?"/>
            </div>
            <div className="form-group full">
              <label className="form-label">CC Notes / Actions Taken</label>
              <textarea className="form-textarea" rows={3} value={form.ccNotes} onChange={e=>set('ccNotes',e.target.value)} placeholder="Command center notes and actions taken..."/>
            </div>
            <div className="form-group full">
              <label className="form-label">Resolution</label>
              <textarea className="form-textarea" rows={2} value={form.resolution} onChange={e=>set('resolution',e.target.value)} placeholder="How was this resolved?"/>
            </div>
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
            <button className="btn btn-primary" onClick={()=>onSave(form)}>
              {item ? '✓ Save Changes' : '+ Log Incident'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}
