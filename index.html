<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISCC 2026 — Command Center</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0f1e;color:#e8eaf0;min-height:100vh}
:root{
  --green:#22c55e;--green-dim:#16a34a;--red:#ef4444;--red-dim:#b91c1c;
  --amber:#f59e0b;--blue:#3b82f6;--blue-dim:#1d4ed8;--purple:#8b5cf6;
  --cyan:#06b6d4;--surface:#111827;--surface2:#1f2937;--surface3:#374151;
  --border:#2d3748;--text-dim:#9ca3af;--text-bright:#f9fafb;
}
/* ===== AUTH ===== */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0a0f1e 0%,#0f1f3d 100%)}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px 40px;width:360px;text-align:center}
.auth-logo{font-size:48px;margin-bottom:16px}
.auth-title{font-size:24px;font-weight:700;color:var(--green);margin-bottom:8px}
.auth-sub{font-size:13px;color:var(--text-dim);margin-bottom:32px}
.auth-input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:14px;letter-spacing:2px;margin-bottom:16px}
.auth-input:focus{outline:none;border-color:var(--green)}
.auth-btn{width:100%;padding:12px;background:var(--green);color:#000;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.auth-btn:hover{background:#16a34a}
.auth-err{color:var(--red);font-size:13px;margin-top:8px}
/* ===== LAYOUT ===== */
.app{display:flex;height:100vh;overflow:hidden}
/* ===== SIDEBAR ===== */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-logo-title{font-size:16px;font-weight:800;color:var(--green);letter-spacing:1px}
.sidebar-logo-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--green);background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:4px;padding:2px 7px;margin-top:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-section{padding:8px 12px 4px;font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:6px;margin:1px 8px;font-size:13px;color:var(--text-dim);transition:all .15s}
.nav-item:hover{background:var(--surface2);color:var(--text-bright)}
.nav-item.active{background:rgba(34,197,94,.15);color:var(--green);font-weight:600}
.nav-icon{width:18px;text-align:center;font-size:16px}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sidebar-clock{padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim)}
.clock-time{font-size:20px;font-weight:700;color:var(--text-bright);font-variant-numeric:tabular-nums}
/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:700;color:var(--text-bright)}
.topbar-actions{display:flex;gap:8px}
.content{flex:1;overflow-y:auto;padding:24px}
/* ===== CARDS ===== */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;opacity:.08;transform:translate(10px,-10px)}
.stat-card.green::before{background:var(--green)}
.stat-card.amber::before{background:var(--amber)}
.stat-card.blue::before{background:var(--blue)}
.stat-card.red::before{background:var(--red)}
.stat-card.purple::before{background:var(--purple)}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:800;color:var(--text-bright)}
.stat-label{font-size:12px;color:var(--text-dim);margin-top:4px}
.stat-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
/* ===== TABLES ===== */
.table-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.table-title{font-size:15px;font-weight:700;color:var(--text-bright)}
.table-sub{font-size:12px;color:var(--text-dim);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;background:var(--surface3);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #1e2535;vertical-align:top}
tr:hover td{background:rgba(255,255,255,.02)}
tr:last-child td{border-bottom:none}
/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.badge.green{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.badge.amber{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.badge.red{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.badge.blue{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.badge.purple{background:rgba(139,92,246,.15);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.badge.gray{background:rgba(156,163,175,.1);color:var(--text-dim);border:1px solid rgba(156,163,175,.2)}
.badge.cyan{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--green);color:#000}
.btn-primary:hover{background:var(--green-dim)}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface3);color:var(--text-bright)}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-dim)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:var(--red-dim)}
.btn-sm{padding:4px 10px;font-size:12px}
/* ===== SEARCH ===== */
.search-bar{position:relative}
.search-bar input{padding:8px 12px 8px 36px;background:var(--surface3);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:13px;width:240px}
.search-bar input:focus{outline:none;border-color:var(--blue)}
.search-bar .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:14px}
/* ===== TABS ===== */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-dim);transition:all .15s}
.tab.active{background:var(--surface3);color:var(--text-bright)}
.tab:hover:not(.active){color:var(--text-bright)}
/* ===== PROFILE MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:700;color:var(--text-bright)}
.modal-body{padding:24px}
.profile-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.info-item label{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.info-item span{font-size:14px;color:var(--text-bright)}
.alert-box{padding:12px 14px;border-radius:8px;margin-bottom:12px;font-size:13px}
.alert-box.allergy{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.alert-box.dietary{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#fcd34d}
.alert-box.minor{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);color:#c4b5fd}
.section-title{font-size:12px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;border-top:1px solid var(--border);padding-top:12px}
/* ===== INCIDENT FORM ===== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:16px}
.form-group.full{grid-column:span 2}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;background:var(--surface3);border:1px solid var(--border);border-radius:8px;color:var(--text-bright);font-size:13px}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--blue)}
.form-textarea{resize:vertical;min-height:80px}
.form-select option{background:var(--surface2)}
/* ===== FLIGHT TRACKER LINK ===== */
.flight-link{color:var(--cyan);text-decoration:none;font-weight:600}
.flight-link:hover{text-decoration:underline}
/* ===== PICKUP STATUS ===== */
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.status-dot.pending{background:var(--amber);animation:pulse 2s ease-in-out infinite}
.status-dot.done{background:var(--green)}
.status-dot.none{background:var(--text-dim)}
/* ===== SECTION HEADER ===== */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.section-heading{font-size:20px;font-weight:800;color:var(--text-bright)}
.section-sub{font-size:13px;color:var(--text-dim);margin-top:4px}
/* ===== ALERT STRIP ===== */
.alert-strip{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#fca5a5;display:flex;align-items:center;gap:8px}
/* ===== MINI TAGS ===== */
.tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600}
/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
/* ===== INCIDENT TABLE ===== */
.inc-row-open td{background:rgba(239,68,68,.04)}
.inc-row-resolved td{background:rgba(34,197,94,.03)}
/* ===== FLIGHT SUMMARY ===== */
.flight-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer}
.flight-card:hover{border-color:var(--blue-dim)}
.flight-meta{flex:1;min-width:0}
.flight-num{font-size:15px;font-weight:700;color:var(--text-bright);font-variant-numeric:tabular-nums}
.flight-airline{font-size:12px;color:var(--text-dim)}
.flight-time{font-size:13px;color:var(--text-bright);font-variant-numeric:tabular-nums}
.passenger-list{font-size:12px;color:var(--text-dim)}
/* ===== MINOR BADGE ===== */
.minor-flag{background:rgba(139,92,246,.15);color:#c4b5fd;border:1px solid rgba(139,92,246,.3);font-size:10px;padding:1px 6px;border-radius:4px;font-weight:700}
/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-icon{font-size:48px;margin-bottom:16px}
/* ===== TOGGLE ===== */
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-switch{width:36px;height:20px;border-radius:10px;background:var(--surface3);position:relative;transition:background .2s}
.toggle-switch.on{background:var(--green)}
.toggle-switch::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .2s}
.toggle-switch.on::after{left:18px}
</style>
</head>

function gsUrl(id, sheet) {
  // Two URL formats: gviz/tq (more data) and export (more CORS-friendly)
  const ts = Date.now();
  return {
    gviz:   `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}&_=${ts}`,
    export: `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&sheet=${encodeURIComponent(sheet)}&_=${ts}`,
  };
}
function gsProxies(id, sheet) {
  const gviz   = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`;
  const exp    = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&sheet=${encodeURIComponent(sheet)}`;
  return [
    // corsproxy.io — most reliable free proxy
    { url: `https://corsproxy.io/?${encodeURIComponent(gviz)}`, json: false },
    { url: `https://corsproxy.io/?${encodeURIComponent(exp)}`,  json: false },
    // allorigins — JSON wrapper (most stable endpoint)
    { url: `https://api.allorigins.win/get?url=${encodeURIComponent(gviz)}`, json: true },
    { url: `https://api.allorigins.win/get?url=${encodeURIComponent(exp)}`,  json: true },
    // allorigins raw
    { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(gviz)}`, json: false },
    // thingproxy fallback
    { url: `https://thingproxy.freeboard.io/fetch/${gviz}`, json: false },
  ];
}

async function fetchCSV(id, sheetName) {
  const isHtml   = t => t.trimStart().startsWith('<!') || t.trimStart().startsWith('<html');
  const isNotCSV = t => !t || isHtml(t) || t.trim().length < 5;

  const parseText = (text, label) => {
    if (isNotCSV(text)) throw new Error('NOT_CSV:' + label);
    const rows = Papa.parse(text, { skipEmptyLines: true }).data;
    if (rows.length === 0) throw new Error('EMPTY:' + label);
    return rows;
  };

  // 1) Direct fetch — works reliably from GitHub Pages (HTTPS) and modern browsers
  const urls = gsUrl(id, sheetName);
  for (const [label, url] of [['gviz-direct', urls.gviz], ['export-direct', urls.export]]) {
    try {
      const res = await fetch(url, { mode: 'cors', cache: 'no-store' });
      if (res.ok) {
        const text = await res.text();
        if (!isNotCSV(text)) return parseText(text, label);
      }
    } catch(_) { /* CORS blocked locally — fall through to proxies */ }
  }

  // 2) Try CORS proxies in sequence
  const proxies = gsProxies(id, sheetName);
  const errors = [];
  for (const { url, json } of proxies) {
    try {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) { errors.push(`HTTP ${res.status}`); continue; }
      const raw  = json ? ((await res.json()).contents || '') : await res.text();
      // Detect Google sign-in page (sheet not public)
      if (raw.includes('accounts.google.com') || raw.includes('ServiceLogin')) {
        throw new Error(`SHARING: Sheet "${sheetName}" is not public — set Share → "Anyone with the link" → Viewer`);
      }
      if (!isNotCSV(raw)) return parseText(raw, url);
      errors.push('proxy returned non-CSV');
    } catch(e) {
      if (e.message.startsWith('SHARING:')) throw new Error(e.message.replace('SHARING:',''));
      errors.push(e.message.replace(/NOT_CSV:|EMPTY:/,''));
    }
  }
  throw new Error(`Sheet "${sheetName}" unreachable — all proxies failed. ${errors.slice(-2).join('; ')}`);
}

// ---- CSV parsing helpers ----
function cv(val) {
  if (val === null || val === undefined) return '';
  const s = String(val).trim();
  return (s === '' || s.toLowerCase() === 'null') ? '' : s;
}

function parseTime(s) {
  s = cv(s);
  if (!s) return '';
  // "08:00:00" or "08:00" → "08:00"
  if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(s)) return s.slice(0, 5);
  // "10:42 AM" style
  const m = s.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if (m) {
    let h = parseInt(m[1]), min = m[2];
    if (m[3] && m[3].toUpperCase() === 'PM' && h < 12) h += 12;
    if (m[3] && m[3].toUpperCase() === 'AM' && h === 12) h = 0;
    return `${String(h).padStart(2,'0')}:${min}`;
  }
  return '';
}

function parseDate(s) {
  s = cv(s);
  if (!s) return '';
  // Fix known March typo → April
  if (s.includes('2026-03-03') || s.includes('3/3/2026')) return '2026-04-03';
  // ISO date
  const iso = s.match(/(\d{4}-\d{2}-\d{2})/);
  if (iso) return iso[1];
  // "April 3rd" style
  if (/april/i.test(s)) return '2026-04-03';
  // M/D/YYYY
  const mdy = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (mdy) return `${mdy[3]}-${String(mdy[1]).padStart(2,'0')}-${String(mdy[2]).padStart(2,'0')}`;
  return '';
}

function normFlight(num) {
  const n = cv(num).toUpperCase().replace(/\s+/g,'');
  if (['', '-', 'N/A', 'NA', 'NONE', 'UNKNOWNATPRESENT', 'NOTBOOKEDYET'].includes(n)) return '';
  return n.replace(/^DELTADELTA/,'DL').replace(/^DELTA(?=[A-Z])/,'DL');
}

function parseVolunteers(nameCell, phoneCell) {
  const names = cv(nameCell).split(/\n|;|&/).map(s=>s.trim()).filter(Boolean);
  const phones = cv(phoneCell).split(/\n|;/).map(s=>s.trim()).filter(Boolean);
  return names.map((n,i) => ({ name: n, phone: phones[i] || '' }));
}

// ---- Parse each sheet from raw CSV rows ----
function parseArrivalIAH(rows) {
  // Row 0 is header, rows 1-72 are working list, 72+ are old backup
  const arrivals = [];
  const seen = new Set();
  for (let i = 1; i <= Math.min(72, rows.length - 1); i++) {
    const r = rows[i];
    if (!r || r.length < 5) continue;
    const fn = cv(r[0]); const ln = cv(r[1]);
    if (!fn || fn === 'First Name') continue;
    const phone = cv(r[2]);
    const category = cv(r[3]);
    const date = parseDate(r[4]);
    const time = parseTime(r[5]);
    const airport = cv(r[6]) || 'IAH';
    const airline = cv(r[7]);
    const flightNum = normFlight(r[8]);
    const pickupTime = parseTime(r[9]);
    const vols = parseVolunteers(r[10], r[11]);
    const transportTo = cv(r[12]);
    const commDone = cv(r[13]);
    const pickupDone = cv(r[14]);
    const notes = cv(r[15]) || cv(r[16]);
    const key = `${fn.toLowerCase()}_${ln.toLowerCase()}_${airport}_${flightNum}`;
    if (seen.has(key)) continue;
    seen.add(key);
    arrivals.push({
      firstName: fn, lastName: ln, fullName: `${fn} ${ln}`.trim(),
      phone, category, date, time, airport, airline, flightNum,
      pickupTime, volunteerName: vols[0]?.name || '', volunteerPhone: vols[0]?.phone || '',
      volunteers: vols, transportTo, commDone, pickupDone, notes, _seen: key
    });
  }
  return { arrivals, seen };
}

function parseArrivalHobby(rows, seenFromIAH) {
  const extra = [];
  const seen = new Set(seenFromIAH);
  // Header is row 0
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 5) continue;
    const fn = cv(r[0]); const ln = cv(r[1]);
    if (!fn || fn === 'First Name') continue;
    const airport = cv(r[5]) || 'HOBBY';
    if (airport !== 'HOBBY') continue; // IAH ones already captured
    const phone = cv(r[2]);
    const date = parseDate(r[3]);
    const time = parseTime(r[4]);
    const airline = cv(r[6]);
    const flightNum = normFlight(r[7]);
    const pickupTime = parseTime(r[8]);
    const vols = parseVolunteers(r[9], r[10]);
    const transportTo = cv(r[11]);
    const key = `${fn.toLowerCase()}_${ln.toLowerCase()}_HOBBY_${flightNum}`;
    if (seen.has(key)) continue;
    seen.add(key);
    extra.push({
      firstName: fn, lastName: ln, fullName: `${fn} ${ln}`.trim(),

      pickupTime, volunteerName: vols[0]?.name || '', volunteerPhone: vols[0]?.phone || '',
      volunteers: vols, transportTo, commDone: '', pickupDone: '', notes: ''
    });
  }
  return extra;
}

function parseDeparture(rows, sheetLabel) {
  const deps = [];
  // Row 0 is header
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r || r.length < 5) continue;
    const fn = cv(r[0]); const ln = cv(r[1]);
    if (!fn || fn === 'First Name') continue;
    const airline = cv(r[6]);
    const flightNum = normFlight(r[7]);
    const vols = parseVolunteers(r[9], r[10]);
    deps.push({
      sheet: sheetLabel,
      firstName: fn, lastName: ln, fullName: `${fn} ${ln}`.trim(),
      phone: cv(r[2]),
      date: parseDate(r[3]), time: parseTime(r[4]),
      airport: cv(r[5]), airline, flightNum,
      pickupTime: parseTime(r[8]),
      volunteerName: vols[0]?.name || '', volunteerPhone: vols[0]?.phone || '',
      volunteers: vols, commDone: '', dropoffDone: '', notes: ''
    });
  }
  return deps;
}

function parseStaff(rows) {
  const staff = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const name = cv(r[2]);
    if (!name) continue;
    staff.push({ id: cv(r[0]), position: cv(r[1]), name, phone: cv(r[3]), email: cv(r[4]), region: cv(r[5]) });
  }
  return staff;
}

function parseAthletes(rows) {
  // Find header row (where col 1 === "First Name")
  let headerIdx = rows.findIndex(r => cv(r[1]) === 'First Name');
  if (headerIdx < 0) headerIdx = 1;
  const athletes = {};
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const fn = cv(r[1]); const ln = cv(r[2]);
    if (!fn) continue;
    const k = `${fn} ${ln}`.toLowerCase().trim();
    athletes[k] = {
      num: cv(r[0]), firstName: fn, lastName: ln, fullName: `${fn} ${ln}`,
      email: cv(r[3]), phone: cv(r[4]),
      emergencyContact: cv(r[5]), emergencyPhone: cv(r[6])
    };
  }
  return athletes;
}

function parseAllergies(rows) {
  const allergies = {}; const dietary = {};
  let mode = null;
  for (const r of rows) {
    const v0 = cv(r[0]);
    if (v0 === 'ALLERGIES') { mode = 'allergy'; continue; }
    if (v0 === 'DIETARY RESTRICTIONS') { mode = 'dietary'; continue; }
    if (!v0 || v0 === 'Name') continue;
    const entry = { name: v0, detail: cv(r[1]), ec1Name: cv(r[2]), ec1Phone: cv(r[5]) };
    if (mode === 'allergy') allergies[v0.toLowerCase()] = entry;
    else if (mode === 'dietary') dietary[v0.toLowerCase()] = entry;
  }
  return { allergies, dietary };
}

function findAllergy(fn, ln, allergies) {
  const nl = `${fn} ${ln}`.toLowerCase();
  for (const [k, v] of Object.entries(allergies))
    if (nl.includes(k) || k.includes(fn.toLowerCase())) return v.detail;
  return '';
}
function findDietary(fn, ln, dietary) {
  const nl = `${fn} ${ln}`.toLowerCase();
  for (const [k, v] of Object.entries(dietary))
    if (nl.includes(k) || k.includes(fn.toLowerCase())) return v.detail;
  return '';
}

function buildProfiles(arrivals, departures, athletesHotel, allergies, dietary) {
  const profiles = {};
  // Seed from hotel list
  for (const [k, a] of Object.entries(athletesHotel)) {
    profiles[k] = { ...a,
      allergies: findAllergy(a.firstName, a.lastName, allergies),
      dietary: findDietary(a.firstName, a.lastName, dietary),
      isMinor: false, arrivals: [], departures: []
    };
  }
  for (const arr of arrivals) {
    const k = arr.fullName.toLowerCase().trim();
    if (!profiles[k]) profiles[k] = {
      firstName: arr.firstName, lastName: arr.lastName, fullName: arr.fullName,
      email: '', phone: arr.phone, emergencyContact: '', emergencyPhone: '',
      allergies: findAllergy(arr.firstName, arr.lastName, allergies),
      dietary: findDietary(arr.firstName, arr.lastName, dietary),
      isMinor: arr.category?.toLowerCase() === 'kid', arrivals: [], departures: []
    };
    else if (arr.category?.toLowerCase() === 'kid') profiles[k].isMinor = true;
    profiles[k].arrivals.push(arr);
  }
  for (const dep of departures) {
    const k = dep.fullName.toLowerCase().trim();
    if (!profiles[k]) profiles[k] = {
      firstName: dep.firstName, lastName: dep.lastName, fullName: dep.fullName,
      email: '', phone: dep.phone, emergencyContact: '', emergencyPhone: '',
      allergies: '', dietary: '', isMinor: false, arrivals: [], departures: []
    };
    profiles[k].departures.push(dep);
  }
  return Object.entries(profiles).map(([,v], i) => ({ ...v, id: `P${String(i+1).padStart(3,'0')}` }));
}

// ---- Parse logistics hotel athletes (for inHotel flag + emergency contacts) ----
function parseLogisticsHotel(rows) {
  // Find header row (has "First Name")
  let headerIdx = rows.findIndex(r => r.some(c => cv(c).toLowerCase().includes('first name')));
  if (headerIdx < 0) headerIdx = 1;
  const phoneSet = new Set();
  const emergMap = {}; // phone → {name, phone}
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const phone = cv(r[4]);
    const emergName = cv(r[5]);
    const emergPhone = cv(r[6]);
    if (!phone) continue;
    const pc = phone.replace(/[\(\)\s\-\.]/g,'');
    phoneSet.add(pc);
    if (emergName) emergMap[pc] = { emergencyContact: emergName, emergencyPhone: emergPhone };
  }
  return { phoneSet, emergMap };
}

  // Extract results - throw if critical sheets failed
  const getOrThrow = (idx, name) => {
    if (results[idx].status === 'rejected') throw new Error(`Sheet "${name}" unreachable`);
    return results[idx].value;
  };
  const getOrEmpty = (idx) => results[idx].status === 'fulfilled' ? results[idx].value : [];

  const rowsIAH      = getOrThrow(0, 'ARRIVAL IAH');
  const rowsHobby    = getOrThrow(1, 'ARRIVAL HOBBY');
  const rowsDep5     = getOrThrow(2, 'DEP 5TH');
  const rowsDep6     = getOrThrow(3, 'DEP 6TH');
  const rowsDep7     = getOrThrow(4, 'DEP 7TH');
  const rowsStaff    = getOrThrow(5, 'ISCC Full Team');
  const rowsAthletes = getOrThrow(6, 'Athletes Staying in Hotel');
  const rowsAllergies= getOrThrow(7, 'Food -Allergies');
  const rowsLogHotel = getOrEmpty(8);  // logistics hotel — optional

  const { arrivals: iahList, seen } = parseArrivalIAH(rowsIAH);
  const hobbyList = parseArrivalHobby(rowsHobby, seen);
  const allArrivals = [...iahList, ...hobbyList];

  const departures = [
    ...parseDeparture(rowsDep5, 'DEP 5TH'),
    ...parseDeparture(rowsDep6, 'DEP 6TH'),
    ...parseDeparture(rowsDep7, 'DEP 7TH'),
  ];

  const staff = parseStaff(rowsStaff);
  const athletesHotel = parseAthletes(rowsAthletes);
  const { allergies, dietary } = parseAllergies(rowsAllergies);
  let players = buildProfiles(allArrivals, departures, athletesHotel, allergies, dietary);

  // Enrich with logistics hotel data (inHotel flag + fill missing emergency contacts)
  if (rowsLogHotel.length > 0) {
    const { phoneSet, emergMap } = parseLogisticsHotel(rowsLogHotel);
    players = players.map(p => {
      const pc = (p.phone||'').replace(/[\(\)\s\-\.]/g,'');
      const inHotel = phoneSet.has(pc);
      const em = emergMap[pc];
      return {
        ...p,
        inHotel,
        emergencyContact: p.emergencyContact || (em?.emergencyContact) || '',
        emergencyPhone: p.emergencyPhone || (em?.emergencyPhone) || '',
      };
    });
  }

  return {
    staff,
    players,
    arrivals_iah: allArrivals.filter(a => a.airport !== 'HOBBY').sort((a,b)=>(a.time||'99').localeCompare(b.time||'99')),
    arrivals_hobby: allArrivals.filter(a => a.airport === 'HOBBY').sort((a,b)=>(a.time||'99').localeCompare(b.time||'99')),
    arrivals_all: allArrivals,
    departures,
    allergies: Object.values(allergies),
    dietary: Object.values(dietary),
  };
}

const PASSWORD = 'ISCC2026';
const STORAGE_KEY = 'iscc_incidents_v2';
const STATUS_KEY = 'iscc_status_v2';

function getFlightLink(airline, flightNum) {
  const num = (flightNum||'').replace(/\s+/g,'').toUpperCase();
  const air = (airline||'').toLowerCase();
  if (!num || num === '-' || num.length < 2) return null;
  // FlightAware link
  if (air.includes('united') || air.includes('ua')) return `https://www.flightaware.com/live/flight/${num.startsWith('UA')?num:'UA'+num}`;
  if (air.includes('frontier') || air.includes('f9')) return `https://www.flightaware.com/live/flight/FFT${num.replace(/^F9/,'')}`;
  if (air.includes('delta') || air.includes('dl')) return `https://www.flightaware.com/live/flight/DAL${num.replace(/^DL/,'')}`;
  if (air.includes('american') || air.includes('aa')) return `https://www.flightaware.com/live/flight/AAL${num}`;
  if (air.includes('southwest') || air.includes('wn')) return `https://www.flightaware.com/live/flight/SWA${num.replace(/^WN/,'')}`;
  if (air.includes('jetblue') || air.includes('b6')) return `https://www.flightaware.com/live/flight/JBU${num}`;
  return `https://www.flightaware.com/live/flight/${num}`;
}

function formatDate(d) {
  if (!d) return '';
  const parts = d.split('-');
  if (parts.length < 3) return d;
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(parts[1])]} ${parseInt(parts[2])}`;
}

function now() { return new Date(); }
function timeStr() {
  const n = now();
  return n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function dateStr() {
  const n = now();
  return n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}

function FlightSummaryView({data}) {
  const [tab, setTab] = useState('arrivals');
  const [dateFilter, setDateFilter] = useState('all');

  const allFlights = useMemo(() => {
    const map = {};
    const add = (list, type) => {
      list.forEach(f => {
        const key = `${type}_${f.airline}_${f.flightNum}_${f.date}_${f.time}`;
        if (!map[key]) map[key] = {...f, type, passengers:[]};
        if (!map[key].passengers.find(p=>p.fullName===f.fullName))
          map[key].passengers.push({fullName:f.fullName,phone:f.phone,category:f.category||''});
      });
    };
    if (tab === 'arrivals') {
      add(data.arrivals_iah, 'arrival-IAH');
      add(data.arrivals_hobby, 'arrival-HOBBY');
    } else {
      add(data.departures, 'departure');
    }
    return Object.values(map).sort((a,b)=>{
      const dc = a.date.localeCompare(b.date);
      if (dc!==0) return dc;
      return a.time.localeCompare(b.time);
    });
  }, [tab]);

  const filtered = dateFilter === 'all' ? allFlights : allFlights.filter(f=>f.date===dateFilter);
  const dates = [...new Set(allFlights.map(f=>f.date).filter(Boolean))].sort();

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-heading">🗓 Flight Summary</div>
          <div className="section-sub">All flights grouped — click to track on FlightAware</div>
        </div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        <div className="tabs" style={{marginBottom:0}}>
          <div className={`tab ${tab==='arrivals'?'active':''}`} onClick={()=>setTab('arrivals')}>Arrivals</div>
          <div className={`tab ${tab==='departures'?'active':''}`} onClick={()=>setTab('departures')}>Departures</div>
        </div>
        <div style={{display:'flex',gap:6,marginLeft:8}}>
          <button className={`btn btn-sm ${dateFilter==='all'?'btn-primary':'btn-ghost'}`} onClick={()=>setDateFilter('all')}>All Dates</button>
          {dates.map(d=>(
            <button key={d} className={`btn btn-sm ${dateFilter===d?'btn-primary':'btn-ghost'}`} onClick={()=>setDateFilter(d)}>{formatDate(d)}</button>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gap:10}}>
        {filtered.map((f,i)=>{
          const link = getFlightLink(f.airline, f.flightNum);
          const airport = f.terminal || f.airport;
          const type = f.type;
          return (
            <div key={i} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 18px'}}>
              <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
                <div style={{fontSize:24}}>{type.startsWith('arrival')?'🛬':'🛫'}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                    <span style={{fontSize:16,fontWeight:700}}>{f.airline} {f.flightNum||'—'}</span>
                    <span className={`badge ${airport==='IAH'?'blue':'amber'}`}>{airport}</span>
                    {link && <span className="badge cyan" style={{fontSize:10}}>TRACKABLE</span>}
                  </div>
                  <div style={{fontSize:13,color:'var(--text-dim)',margin:'4px 0'}}>
                    {formatDate(f.date)} · <strong style={{color:'var(--text-bright)'}}>{f.time||'—'}</strong>
                    {f.pickupTime && f.pickupTime!=='No Ride Needed' && <> · Pickup: <strong style={{color:'var(--green)'}}>{f.pickupTime}</strong></>}
                    {f.volunteerName && <> · 🚗 {f.volunteerName}</>}
                  </div>
                  <div style={{fontSize:12,color:'var(--text-dim)'}}>
                    <strong style={{color:'var(--text-bright)'}}>{f.passengers.length} passenger{f.passengers.length!==1?'s':''}:</strong>{' '}
                    {f.passengers.map(p=>(
                      <span key={p.fullName} style={{marginRight:8}}>
                        {p.fullName}{(p.category==='Kid'||p.category==='kid')?<span className="minor-flag" style={{marginLeft:3}}>M</span>:''}
                      </span>
                    ))}
                  </div>
                </div>
                {link && (
                  <a href={link} target="_blank" className="btn btn-blue btn-sm">
                    🛩 Track Live
                  </a>
                )}
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div className="empty-state"><div className="empty-icon">✈️</div><div>No flights for selected date</div></div>
        )}
      </div>
    </div>
  );
}

const INC_TYPES = ['Medical','Security','Lost Item','Behavioral','Transport','Facility','Other'];
const INC_LEVELS = ['Low','Medium','High','Critical'];
const INC_SITES = ['Hotel / HILTON','IAH Airport','Hobby Airport','Field / Venue','Team Bus','Other'];
const INC_STATUS = ['Open','In Progress','Escalated','Resolved'];

function IncidentsView({data, incidents, setIncidents}) {
  const [showForm, setShowForm] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');

  const filtered = incidents.filter(inc => {
    const q = search.toLowerCase();
    const matchQ = !q || inc.personInvolved?.toLowerCase().includes(q) || inc.description?.toLowerCase().includes(q) || inc.type?.toLowerCase().includes(q);
    const matchS = statusFilter === 'all' || inc.status === statusFilter;
    return matchQ && matchS;
  });

  const saveIncident = (data) => {
    let next;
    if (data.id) {
      next = incidents.map(i=>i.id===data.id?{...data,updatedAt:new Date().toISOString()}:i);
    } else {
      const newInc = {...data, id:`INC-${Date.now()}`, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()};
      next = [newInc, ...incidents];
    }
    setIncidents(next);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    setShowForm(false);
    setEditItem(null);
  };

  const deleteIncident = (id) => {
    if (!confirm('Delete this incident?')) return;
    const next = incidents.filter(i=>i.id!==id);
    setIncidents(next);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(incidents,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`iscc_incidents_${Date.now()}.json`; a.click();
  };

  const exportCSV = () => {
    const rows = [['ID','DateTime','Type','Level','Status','Person Involved','Site','Reported By','Description','Escalation','Resolution','Created']];
    incidents.forEach(i=>rows.push([i.id,i.dateTime,i.type,i.level,i.status,i.personInvolved,i.site,i.reportedBy,i.description,i.escalation,i.resolution,i.createdAt]));
    const csv = rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`iscc_incidents_${Date.now()}.csv`; a.click();
  };

  const levelColor = l => l==='Critical'?'red':l==='High'?'amber':l==='Medium'?'blue':'gray';
  const statusColor = s => s==='Resolved'?'green':s==='Escalated'?'red':s==='In Progress'?'amber':'gray';

  return (
    <div>
      <div className="section-header">
        <div>
          <div className="section-heading">🚨 Incident Tracker</div>
          <div className="section-sub">{incidents.length} total · {incidents.filter(i=>i.status!=='Resolved').length} open</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={exportJSON}>💾 Export JSON</button>
          <button className="btn btn-ghost btn-sm" onClick={exportCSV}>📥 Export CSV</button>
          <button className="btn btn-primary" onClick={()=>{setEditItem(null);setShowForm(true)}}>+ Log Incident</button>
        </div>
      </div>

      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {['all','Open','In Progress','Escalated','Resolved'].map(s=>(
          <button key={s} className={`btn btn-sm ${statusFilter===s?'btn-primary':'btn-ghost'}`} onClick={()=>setStatusFilter(s)}>
            {s==='all'?'All':s} {s!=='all'?`(${incidents.filter(i=>i.status===s).length})`:`(${incidents.length})`}
          </button>
        ))}
        <div className="search-bar" style={{marginLeft:'auto'}}>
          <span className="search-icon">🔍</span>
          <input placeholder="Search incidents..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
      </div>

      {filtered.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">✅</div>
          <div style={{fontSize:16,fontWeight:600,marginBottom:8}}>No incidents</div>
          <div>All clear — log an incident using the button above</div>
        </div>
      ) : (
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>ID</th><th>Date/Time</th><th>Type</th><th>Level</th>
              <th>Person(s) Involved</th><th>Site</th><th>Status</th><th>Actions</th>
            </tr></thead>
            <tbody>
              {filtered.map((inc,i)=>(
                <tr key={i} className={`inc-row-${inc.status==='Resolved'?'resolved':'open'}`}>
                  <td><span style={{fontFamily:'monospace',fontSize:12,color:'var(--text-dim)'}}>{inc.id}</span></td>
                  <td style={{whiteSpace:'nowrap',fontSize:13}}>{inc.dateTime}</td>
                  <td>{inc.type}</td>
                  <td><span className={`badge ${levelColor(inc.level)}`}>{inc.level}</span></td>
                  <td>
                    <div style={{fontWeight:600,fontSize:13}}>{inc.personInvolved||'—'}</div>
                    <div style={{fontSize:12,color:'var(--text-dim)'}}>{inc.description?.substring(0,60)}{inc.description?.length>60?'...':''}</div>
                  </td>
                  <td style={{fontSize:13}}>{inc.site||'—'}</td>
                  <td><span className={`badge ${statusColor(inc.status)}`}>{inc.status}</span></td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setEditItem(inc);setShowForm(true)}}>✏</button>
                      <button className="btn btn-sm" style={{background:'var(--red)',color:'#fff'}} onClick={()=>deleteIncident(inc.id)}>🗑</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {showForm && (
        <IncidentForm
          item={editItem}
          data={data}
          onSave={saveIncident}
          onCancel={()=>{setShowForm(false);setEditItem(null)}}
        />
      )}
    </div>
  );
}

const VENUES = [
  { name:'KISC', full:'Katy Intl Sports Complex', address:'2029 Pecan Ln, Katy TX 77494', lat:29.7155, lon:-95.8244, checkin:'Check-in starts 6:30 AM', color:'var(--blue)' },
  { name:'HSF',  full:'Houston Soccer Field',      address:'18850 FM 529, Cypress TX 77433', lat:29.8461, lon:-95.6500, checkin:'Check-in starts 7:30 AM', color:'var(--green)' },
];
function wmoIcon(c){if(c===0)return'☀️';if(c<=2)return'🌤';if(c===3)return'☁️';if(c<=48)return'🌫';if(c<=55)return'🌦';if(c<=65)return'🌧';if(c<=77)return'🌨';if(c<=82)return'🌦';return'⛈';}
function wmoDesc(c){if(c===0)return'Clear Sky';if(c<=2)return'Partly Cloudy';if(c===3)return'Overcast';if(c<=48)return'Foggy';if(c<=55)return'Drizzle';if(c<=65)return'Rain';if(c<=77)return'Snow';if(c<=82)return'Showers';return'Thunderstorm';}
function playingConditions(cur){
  if(!cur)return{label:'Unknown',color:'var(--text-dim)'};
  const t=cur.temperature_2m, w=cur.wind_speed_10m, p=cur.precipitation, c=cur.weather_code;
  if(c>=95||p>0.1||w>30||t>105||t<35)return{label:'⚠ Challenging',color:'var(--red)'};
  if(c>=61||p>0||w>20||t>98||t<45)return{label:'◔ Fair',color:'var(--amber)'};
  return{label:'✓ Good',color:'var(--green)'};
}
function WeatherWidget(){
  const [wx,setWx]=useState({});
  const [loading,setLoading]=useState(true);
  const [lastFetch,setLastFetch]=useState(null);
  const load=useCallback(()=>{
    setLoading(true);
    Promise.all(VENUES.map(v=>
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${v.lat}&longitude=${v.lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,wind_direction_10m&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America%2FChicago`,{cache:'no-store'})
        .then(r=>r.json()).then(d=>({...v,cur:d.current,ok:true})).catch(()=>({...v,ok:false}))
    )).then(rs=>{
      const m={};rs.forEach(r=>{m[r.name]=r;});
      setWx(m);setLastFetch(new Date());setLoading(false);
    });
  },[]);
  useEffect(()=>{load();const t=setInterval(load,15*60*1000);return()=>clearInterval(t);},[load]);
  const windDir=d=>{const dirs=['N','NE','E','SE','S','SW','W','NW'];return dirs[Math.round(d/45)%8]||'';};
  return(
    <div style={{marginBottom:20}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontWeight:700,fontSize:13,color:'var(--text-dim)',letterSpacing:1}}>🌤 VENUE WEATHER — LIVE</div>
        <div style={{display:'flex',alignItems:'center',gap:8,fontSize:11,color:'var(--text-dim)'}}>
          {lastFetch&&<span>Updated {lastFetch.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>}
          <button className="btn btn-ghost btn-sm" style={{padding:'2px 8px',fontSize:11}} onClick={load}>{loading?'⟳ Loading…':'↻ Refresh'}</button>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(340px,1fr))',gap:14}}>
        {VENUES.map(v=>{
          const d=wx[v.name];
          const cur=d?.cur;
          const cond=playingConditions(cur);
          return(
            <div key={v.name} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:'16px 18px',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:0,left:0,width:4,bottom:0,background:v.color,borderRadius:'12px 0 0 12px'}}/>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{background:v.color,color:'#fff',borderRadius:6,padding:'2px 8px',fontWeight:700,fontSize:12}}>{v.name}</span>
                    <span style={{fontWeight:600,fontSize:13}}>{v.full}</span>
                  </div>
                  <div style={{fontSize:11,color:'var(--text-dim)',marginTop:3}}>📍 {v.address}</div>
                  <div style={{fontSize:11,color:'var(--cyan)',marginTop:2}}>⏰ {v.checkin}</div>
                </div>
                {cur&&<span style={{fontSize:36,lineHeight:1}}>{wmoIcon(cur.weather_code)}</span>}
              </div>
              {loading&&!cur&&(
                <div style={{color:'var(--text-dim)',fontSize:13,textAlign:'center',padding:'12px 0'}}>Loading weather…</div>
              )}
              {!loading&&!d?.ok&&(
                <div style={{color:'var(--text-dim)',fontSize:12}}>Weather unavailable</div>
              )}
              {cur&&(
                <div>
                  <div style={{display:'flex',alignItems:'flex-end',gap:6,marginBottom:8}}>
                    <span style={{fontSize:42,fontWeight:700,lineHeight:1}}>{Math.round(cur.temperature_2m)}°F</span>
                    <div style={{marginBottom:6}}>
                      <div style={{fontSize:12,color:'var(--text-dim)'}}>Feels {Math.round(cur.apparent_temperature)}°F</div>
                      <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{wmoDesc(cur.weather_code)}</div>
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
                    <div style={{background:'var(--surface3,rgba(255,255,255,.04))',borderRadius:8,padding:'8px',textAlign:'center'}}>
                      <div style={{fontSize:18}}>💨</div>
                      <div style={{fontSize:13,fontWeight:600}}>{Math.round(cur.wind_speed_10m)} mph</div>
                      <div style={{fontSize:10,color:'var(--text-dim)'}}>{windDir(cur.wind_direction_10m)} Wind</div>
                    </div>
                    <div style={{background:'var(--surface3,rgba(255,255,255,.04))',borderRadius:8,padding:'8px',textAlign:'center'}}>
                      <div style={{fontSize:18}}>💧</div>
                      <div style={{fontSize:13,fontWeight:600}}>{cur.relative_humidity_2m}%</div>
                      <div style={{fontSize:10,color:'var(--text-dim)'}}>Humidity</div>
                    </div>
                    <div style={{background:'var(--surface3,rgba(255,255,255,.04))',borderRadius:8,padding:'8px',textAlign:'center'}}>
                      <div style={{fontSize:18}}>🌧</div>
                      <div style={{fontSize:13,fontWeight:600}}>{cur.precipitation}"</div>
                      <div style={{fontSize:10,color:'var(--text-dim)'}}>Precip</div>
                    </div>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{fontSize:12,fontWeight:700,color:cond.color}}>Field Conditions: {cond.label}</span>
                    <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(v.address)}`} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:'var(--cyan)',textDecoration:'none'}}>📍 Maps</a>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

                <span style={{fontWeight:600}}>{t}</span><span style={{color:'var(--text-dim)'}}>{l}</span>
              </div>
            ))}
            <div style={{marginTop:12,padding:12,background:'rgba(139,92,246,.1)',borderRadius:8,border:'1px solid rgba(139,92,246,.3)'}}>
              <div style={{fontWeight:700,fontSize:12,color:'var(--purple)',marginBottom:4}}>✨ Ismaili Center Tours</div>
              <div style={{fontSize:12,color:'var(--text-dim)'}}>8:15 PM · Starting at Reflection Fountain<br/>Self-guided with stationed tour guides</div>
            </div>
          </div>
          <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:18}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:12,color:'var(--green)'}}>🏟 Saturday On-Site Check-In</div>
            {VENUES.map(v=>(
              <div key={v.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                <div>
                  <span style={{background:v.color,color:'#fff',borderRadius:5,padding:'2px 7px',fontSize:11,fontWeight:700,marginRight:8}}>{v.name}</span>
                  <span style={{fontSize:13}}>{v.full}</span>
                  <div style={{fontSize:11,color:'var(--text-dim)',marginTop:3}}>📍 {v.address}</div>
                </div>
                <div style={{fontSize:12,fontWeight:700,color:'var(--cyan)',textAlign:'right'}}>{v.checkin}</div>
              </div>
            ))}
          </div>
          <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:18,gridColumn:'1/-1'}}>
            <div style={{fontWeight:700,fontSize:15,marginBottom:10,color:'var(--red)'}}>⚠️ Important Rules</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:10}}>
              {[
                ['👤 Registration Required','All athletes must complete check-in before playing. No check-in = no play.'],
                ['👶 Minors (Under 18)','Chaperone MUST be present to complete check-in. No chaperone = no check-in = no participation.'],
                ['⏰ Arrive Early','Plan to arrive 30–45 minutes before your first game to complete check-in.'],
                ['⚽ 5v5 Format','40-min game + 10-min halftime + 25-min transition. Each team plays 4 matches.'],
                ['⚽ 7v7 Format','50-min game + 5-min halftime + 10-min transition. Each team plays 4 matches.'],
                ['📊 Standings','Live standings are unofficial during Saturday. Max +6 goal differential cap per match.'],
              ].map(([t,d])=>(
                <div key={t} style={{background:'var(--surface1)',borderRadius:8,padding:'10px 12px'}}>
                  <div style={{fontWeight:700,fontSize:12,marginBottom:4}}>{t}</div>
                  <div style={{fontSize:12,color:'var(--text-dim)',lineHeight:1.5}}>{d}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {activeGroup==='5v5'&&(
        <div className="table-wrap">
          <div className="table-header">
            <div>
              <div className="table-title">⚽ 5v5 Group Stage — HSF Fields 5A & 5B</div>
              <div className="table-sub">Teams: MKB A · MKB B · Wingers FC · Defenders FC · Midfielders FC</div>
            </div>
          </div>
          <table>
            <thead><tr><th>Time</th><th>HSF Field 5A</th><th>HSF Field 5B</th></tr></thead>
            <tbody>
              {SCHEDULE_5V5.map((row,i)=>(
                <tr key={i}>
                  <td style={{fontWeight:700,whiteSpace:'nowrap'}}>{row.time}</td>
                  <td>{row['5A']}</td>
                  <td style={{color:row['5B']==='Open Slot'?'var(--text-dim)':undefined}}>{row['5B']}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {SCHEDULE_7V7.map(g=>activeGroup===`7v7-${g.group}`&&(
        <div key={g.group} className="table-wrap">
          <div className="table-header">
            <div>
              <div className="table-title">⚽ Group {g.group} (7v7) — {g.venue} {g.field}</div>
              <div className="table-sub">Teams: {g.teams.join(' · ')}</div>
            </div>
          </div>
          <table>
            <thead><tr><th>Time</th><th>Match</th></tr></thead>
            <tbody>
              {g.matches.map((row,i)=>(
                <tr key={i} style={{opacity:isBreak(row.m)?0.5:1}}>
                  <td style={{fontWeight:700,whiteSpace:'nowrap'}}>{row.time}</td>
                  <td style={{fontStyle:isBreak(row.m)?'italic':undefined,color:isBreak(row.m)?'var(--text-dim)':undefined}}>{row.m}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ))}
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [authed, setAuthed] = useState(false);
  const [view, setView] = useState('dashboard');
  const [incidents, setIncidents] = useState([]);
  const [statuses, setStatuses] = useState({});
  const [liveData, setLiveData] = useState(null);       // null = using static fallback
  const [liveStatus, setLiveStatus] = useState('idle'); // idle | loading | ok | error
  const [lastRefresh, setLastRefresh] = useState(null);
  const [liveError, setLiveError] = useState('');

  // Active dataset: live if loaded, else static embedded
  const DATA = liveData || ISCC_DATA;

  const refreshLive = useCallback(async () => {
    setLiveStatus('loading');
    setLiveError('');
    try {
      const fresh = await fetchAllSheets();
      setLiveData(fresh);
      setLiveStatus('ok');
      setLastRefresh(new Date());
    } catch(e) {
      console.error('Live fetch failed:', e);
      setLiveStatus('error');
      setLiveError(e.message || 'Unknown error');
    }
  }, []);

  useEffect(() => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) try { setIncidents(JSON.parse(saved)); } catch(e){}
    const savedSt = localStorage.getItem(STATUS_KEY);
    if (savedSt) try { setStatuses(JSON.parse(savedSt)); } catch(e){}
  }, []);

  // Auto-fetch on login
  useEffect(() => {
    if (authed) refreshLive();
  }, [authed]);

  if (!authed) return <AuthScreen onLogin={()=>setAuthed(true)}/>;

  const navItems = [
    {section:'OVERVIEW'},
    {key:'dashboard', icon:'🏠', label:'Dashboard'},
    {section:'AIRPORT OPS'},
    {key:'arrivals', icon:'🛬', label:'Arrivals', badge: DATA.arrivals_iah.length + DATA.arrivals_hobby.length},
    {key:'departures', icon:'🛫', label:'Departures', badge: DATA.departures.length},
    {key:'flights', icon:'🗓', label:'Flight Summary'},
    {section:'PEOPLE'},
    {key:'players', icon:'👥', label:'Athlete Profiles', badge: DATA.players.length},
    {key:'staff', icon:'👔', label:'Staff Directory'},
    {section:'TOURNAMENT'},
    {key:'schedule', icon:'📅', label:'Schedule & Venues'},
    {section:'OPERATIONS'},
    {key:'incidents', icon:'🚨', label:'Incidents', badge: incidents.filter(i=>i.status!=='Resolved').length||null},
  ];

  const views = {
    dashboard: <Dashboard data={DATA} incidents={incidents} statuses={statuses} onNav={setView}/>,
    arrivals: <ArrivalsView data={DATA} statuses={statuses} setStatuses={setStatuses}/>,
    departures: <DeparturesView data={DATA} statuses={statuses} setStatuses={setStatuses}/>,
    flights: <FlightSummaryView data={DATA}/>,
    players: <PlayersView data={DATA}/>,
    staff: <StaffView data={DATA}/>,
    schedule: <ScheduleView/>,
    incidents: <IncidentsView data={DATA} incidents={incidents} setIncidents={setIncidents}/>,
  };

  const titles = {
    dashboard:'Command Center Dashboard', arrivals:'Airport Arrivals',
    departures:'Departures', flights:'Flight Summary',
    players:'Athlete Profiles', staff:'Staff Directory', schedule:'Schedule & Venues', incidents:'Incident Tracker'
  };

  const liveIndicator = () => {
    if (liveStatus === 'loading') return (
      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--amber)'}}>
        <span style={{animation:'spin 1s linear infinite',display:'inline-block'}}>⟳</span> Fetching live data…
      </div>
    );
    if (liveStatus === 'ok') return (
      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--green)'}}>
        <span className="live-dot" style={{flexShrink:0}}></span>
        Live · {lastRefresh?.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}
        <button className="btn btn-ghost btn-sm" style={{padding:'2px 8px',fontSize:11}} onClick={refreshLive}>↻ Refresh</button>
      </div>
    );
    if (liveStatus === 'error') return (
      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--amber)'}} title={liveError}>
        ⚠ Using cached data
        <button className="btn btn-ghost btn-sm" style={{padding:'2px 8px',fontSize:11}} onClick={refreshLive}>↻ Retry</button>
      </div>
    );
    return <span style={{fontSize:12,color:'var(--text-dim)'}}>Houston, TX · Apr 3–7, 2026</span>;
  };

  return (
    <div className="app">
      <div className="sidebar">
        <div className="sidebar-logo">
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:22}}>⚽</span>
            <div>
              <div className="sidebar-logo-title">ISCC 2026</div>
              <div className="sidebar-logo-sub">Command Center</div>
            </div>
          </div>
        </div>
        <nav className="sidebar-nav">
          {navItems.map((item,i)=>{
            if (item.section) return <div key={i} className="nav-section">{item.section}</div>;
            return (
              <div key={item.key} className={`nav-item ${view===item.key?'active':''}`} onClick={()=>setView(item.key)}>
                <span className="nav-icon">{item.icon}</span>
                <span>{item.label}</span>
                {item.badge ? <span className="nav-badge">{item.badge}</span> : null}
              </div>
            );
          })}
        </nav>
        <Clock/>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{titles[view]}</div>
          <div className="topbar-actions">
            {liveIndicator()}
          </div>
        </div>
        {liveStatus === 'loading' && (
          <div style={{background:'rgba(59,130,246,.08)',borderBottom:'1px solid rgba(59,130,246,.2)',padding:'8px 24px',fontSize:12,color:'var(--blue)',display:'flex',alignItems:'center',gap:8}}>
            <span style={{animation:'spin 1s linear infinite',display:'inline-block',fontSize:14}}>⟳</span>
            Connecting to Google Sheets — fetching live data from all 8 tabs…
          </div>
        )}
        {liveStatus === 'error' && (
          <div style={{background:'rgba(245,158,11,.08)',borderBottom:'1px solid rgba(245,158,11,.2)',padding:'8px 24px',fontSize:12,color:'var(--amber)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span>⚠ Google Sheets sync failed.</span>
              <button className="btn btn-ghost btn-sm" style={{padding:'2px 8px',fontSize:11}} onClick={refreshLive}>↻ Retry</button>
            </div>
            <div style={{marginTop:4,fontSize:11,opacity:.85,lineHeight:1.5}}>
              <strong>Error:</strong> {liveError}<br/>
              {liveError && liveError.includes('not public') ? (
                <><strong>Fix:</strong> In Google Sheets → Share → "Anyone with the link" → Viewer → Done. Then retry.</>
              ) : (
                <><strong>Fix:</strong> The free CORS proxies are temporarily overloaded. <button className="btn btn-ghost btn-sm" style={{padding:'2px 8px',fontSize:11,display:'inline'}} onClick={refreshLive}>↻ Retry now</button> — or open this page from <strong>GitHub Pages</strong> (direct Google Sheets access, no proxies needed).</>
              )}
            </div>
            <div style={{marginTop:6,display:'flex',gap:6,flexWrap:'wrap'}}>
              {[
                [`Transport`, GS.TRANSPORT, 'ARRIVAL IAH'],
                [`Contacts`, GS.CONTACTS, 'ISCC Full Team'],
                [`Incidents`, GS.INCIDENTS, 'ISCC_Incidents'],
              ].map(([label, id, sheet]) => (
                <a key={label}
                   href={`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`}
                   target="_blank" rel="noopener noreferrer"
                   style={{fontSize:10,padding:'2px 8px',borderRadius:4,background:'rgba(245,158,11,.2)',color:'var(--amber)',textDecoration:'none',border:'1px solid rgba(245,158,11,.4)'}}>
                  🔗 Test {label} CSV
                </a>
              ))}
            </div>
          </div>
        )}
        <div className="content">
          {views[view]}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
